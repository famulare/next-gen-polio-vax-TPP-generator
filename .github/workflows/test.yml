name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y r-base
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
      - run: git diff --exit-code -- dist/index.html
