<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src data:;">
<title>Next-generation polio vaccine TPP generator</title>
<style>:root {
  color-scheme: light;
  --paper: #F5F3ED;
  --paper-deep: #FFFFFF;
  --ink: #313A44;
  --muted: rgb(49 58 68 / 78%);
  --faint: rgb(49 58 68 / 52%);
  --line: rgb(49 58 68 / 28%);
  --line-dark: rgb(49 58 68 / 65%);
  --accent: #EBCB00;
  --russet: #6C1446;
  --russet-dark: #6C1446;
  --russet-soft: rgb(108 20 70 / 24%);
  --focus: #12236D;
  --error: #771109;
  --surface-blue: #2166AC;
  --white-map: #F7F7F2;
  --surface-red: #B2182B;
  --serif: "Noto Serif", Georgia, serif;
  --sans: "Noto Sans", Arial, sans-serif;
  /* Type scale: three headings (display/h2/h3) + a serif accent, a body family
     (lede/intro/body/small), and a label family (nav/label/micro). */
  --fs-display: clamp(2.5rem, 4.6vw, 4.2rem);
  --fs-h2: clamp(1.7rem, 3.2vw, 2.9rem);
  --fs-h3: 1.5rem;
  --fs-accent: 1.3rem;
  --fs-lede: clamp(1.12rem, 1.5vw, 1.35rem);
  --fs-intro: 1.18rem;
  --fs-body: 1.02rem;
  --fs-small: .9rem;
  --fs-label: .82rem;
  --fs-micro: .74rem;
  font-family: var(--sans);
  font-synthesis: none;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--paper); color: var(--ink); line-height: 1.55; font-size: var(--fs-body); }
button, input, select { font: inherit; }
a { color: inherit; text-underline-offset: .2em; }
[hidden] { display: none !important; }

.skip-link { position: fixed; z-index: 30; top: 8px; left: 8px; transform: translateY(-160%); background: var(--ink); color: var(--paper); padding: 8px 12px; }
.skip-link:focus { transform: none; }
.site-header { position: sticky; z-index: 20; top: 0; display: flex; align-items: center; justify-content: space-between; min-height: 54px; padding: 0 clamp(16px, 4vw, 58px); border-bottom: 1px solid var(--ink); background: var(--accent); }
.wordmark { flex: 0 0 auto; white-space: nowrap; font-weight: 800; letter-spacing: .12em; text-decoration: none; font-size: var(--fs-body); }
.site-header nav { display: flex; gap: clamp(12px, 2vw, 28px); font-size: var(--fs-body); }
.site-header nav a { color: rgb(49 58 68 / 85%); text-decoration: none; }
.site-header nav a:hover { color: var(--ink); }

.app-shell, .site-footer { width: min(1240px, calc(100% - clamp(28px, 7vw, 96px))); margin-inline: auto; }
.hero { min-height: 42vh; display: flex; flex-direction: column; justify-content: flex-end; max-width: 1020px; padding: clamp(70px, 12vw, 150px) 0 58px; }
.eyebrow, .chapter-number, .result-label, .inspector-label { margin: 0 0 10px; color: var(--focus); font-size: var(--fs-label); font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1, h2, h3 { font-family: var(--serif); }
h1, h2 { font-weight: 600; }
h3 { font-weight: 400; }
h1 { max-width: 980px; margin-bottom: 24px; font-size: var(--fs-display); line-height: .98; letter-spacing: -.035em; }
h2 { margin-bottom: 14px; font-size: var(--fs-h2); line-height: 1.06; letter-spacing: -.02em; }
h3 { font-size: var(--fs-h3); }
.lede { max-width: 760px; margin-bottom: 28px; color: var(--muted); font-family: var(--serif); font-size: var(--fs-lede); }
.opening-comparison { display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1.2fr); gap: 6px 20px; align-items: stretch; max-width: 960px; margin: 0 0 22px; padding: 12px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: var(--fs-body); }
.opening-comparison .cohort { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.opening-comparison .cohort-tag { color: var(--russet-dark); font-size: var(--fs-label); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.opening-comparison strong { font-weight: 600; }
.opening-comparison i { align-self: center; color: var(--russet); font-family: var(--serif); font-size: var(--fs-accent); font-style: normal; }
.prototype-banner { display: flex; gap: 14px; align-items: baseline; max-width: 840px; padding-top: 13px; border-top: 4px solid var(--accent); color: var(--muted); font-size: var(--fs-small); }
.prototype-banner strong { flex: 0 0 auto; color: var(--ink); }

.opening { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(290px, .55fr); gap: clamp(32px, 6vw, 90px); align-items: start; padding: 44px 0 52px; border-top: 1px solid var(--ink); }
#story-results { min-width: 0; transition: opacity .15s ease, filter .15s ease; }
#story-results.is-stale { opacity: .52; filter: grayscale(.65); }
.result-status { padding: 0 0 30px; border-bottom: 1px solid var(--line); }
.result-status h2 { max-width: 760px; }
.result-status.fail h2, .result-status.tie h2 { color: var(--error); }
.result-number { display: grid; grid-template-columns: auto 1fr; gap: 0 18px; align-items: end; width: fit-content; margin: 26px 0 24px; font-size: var(--fs-small); color: var(--muted); }
.result-number strong { grid-row: span 2; grid-column: 1; color: var(--ink); font-family: var(--serif); font-size: clamp(3.8rem, 8vw, 7rem); font-weight: 400; line-height: .8; font-variant-numeric: tabular-nums; }
.result-number span:first-child { grid-column: 2; align-self: end; color: var(--ink); font-weight: 750; }
.result-number span:last-child { grid-column: 2; max-width: 340px; }
.qualification { max-width: 760px; margin: 0; padding-left: 18px; border-left: 4px solid var(--accent); color: var(--muted); }
.opening-meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; padding-top: 20px; }
.opening-meta p { margin: 0; }
.opening-meta span { display: block; margin-bottom: 4px; color: var(--muted); font-size: var(--fs-label); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.opening-meta strong { display: block; font-size: var(--fs-small); line-height: 1.4; }

.decision-controls { padding-left: 26px; border-left: 1px solid var(--line-dark); }
.narrative-controls { max-width: 1020px; margin: 46px auto 0; padding: 24px; border: 1px solid var(--line-dark); background: var(--paper-deep); }
.setting-controls { margin-top: 40px; }
.control-row { display: grid; grid-template-columns: minmax(220px, 1.35fr) repeat(2, minmax(180px, .8fr)); gap: 24px; align-items: start; }
.setting-controls .control-row { grid-template-columns: repeat(2, minmax(220px, 1fr)); max-width: 720px; }
.narrative-summary { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline; margin: 0 0 30px; padding: 13px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); color: var(--muted); font-size: var(--fs-small); }
.narrative-summary strong { color: var(--ink); font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.print-product-summary { display: none; }
.controls-title { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.controls-title h2 { font-family: var(--serif); font-size: var(--fs-h3); }
label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; font-size: var(--fs-small); font-weight: 750; letter-spacing: .02em; }
label small { color: var(--muted); font-size: var(--fs-label); font-weight: 400; line-height: 1.4; letter-spacing: 0; }
select, input[type="number"] { width: 100%; min-height: 42px; padding: 8px 9px; border: 1px solid var(--line-dark); border-radius: 0; background: var(--paper-deep); color: var(--ink); }
select:hover, input[type="number"]:hover { border-color: var(--ink); }
input[type="range"] { width: 100%; accent-color: var(--russet); }
output { align-self: flex-end; color: var(--russet-dark); font-variant-numeric: tabular-nums; }
.control-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.control-actions { display: flex; gap: 12px; align-items: center; margin-top: 18px; }
.control-actions span { color: var(--muted); font-size: var(--fs-micro); }
button { min-height: 40px; padding: 9px 15px; border: 1px solid var(--ink); border-radius: 0; background: transparent; color: var(--ink); cursor: pointer; font-size: var(--fs-small); font-weight: 760; }
button:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
button.primary { background: var(--accent); color: var(--ink); }
button.primary:hover:not(:disabled) { background: var(--ink); border-color: var(--ink); color: var(--paper); }
button.text-button { min-height: auto; padding: 3px 0; border: 0; border-bottom: 1px solid currentColor; color: var(--muted); }
button:disabled { cursor: not-allowed; opacity: .38; }
button:focus-visible, a:focus-visible, summary:focus-visible, select:focus-visible, input:focus-visible, svg:focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; }

.warning { margin: 14px 0 0; padding: 10px 0 10px 14px; border-left: 3px solid var(--russet); color: var(--russet-dark); font-size: var(--fs-small); }
.warning.notice { border-color: var(--line-dark); color: var(--muted); }
.transaction-status { min-height: 44px; margin: 0; padding: 12px 0; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-small); }
.transaction-status.stale, .transaction-status.invalid { color: var(--russet-dark); }

.chapter { padding: clamp(66px, 10vw, 130px) 0; border-top: 1px solid var(--ink); }
.chapter-heading { display: grid; grid-template-columns: minmax(120px, .27fr) minmax(0, .73fr); gap: clamp(24px, 5vw, 80px); margin-bottom: 50px; }
.chapter-heading > div { max-width: 850px; }
.chapter-heading > div > p { max-width: 730px; color: var(--muted); font-size: var(--fs-intro); }
.surface-chapter { padding-top: 75px; }
.hero-figure, .linked-maps figure { margin: 0; }
.hero-figure { width: min(100%, 1060px); margin-inline: auto; }
.chart-slot { width: 100%; min-height: 120px; }
.scientific-chart { display: block; width: 100%; height: auto; overflow: visible; }
figcaption { max-width: 880px; margin: 13px 0 0; color: var(--muted); font-size: var(--fs-small); }
figcaption strong { color: var(--ink); }

.motif { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: clamp(14px, 3vw, 42px); align-items: center; margin: 20px 0 54px; }
.motif article { min-height: 170px; padding-top: 15px; border-top: 2px solid var(--ink); }
.motif article span { color: var(--russet); font-size: var(--fs-label); font-weight: 800; }
.motif article strong { display: block; margin: 11px 0 8px; font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.motif article p { color: var(--muted); font-size: var(--fs-small); }
.motif i { font-family: var(--serif); font-size: 2rem; font-style: normal; }
.pathway { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr; gap: clamp(10px, 2vw, 30px); align-items: center; margin: 18px 0 36px; }
.pathway article { min-height: 152px; padding: 15px 4px 0; border-top: 2px solid var(--ink); }
.pathway article span { color: var(--russet); font-size: var(--fs-label); font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
.pathway article strong { display: block; margin: 10px 0 7px; font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.pathway article p { margin: 0; color: var(--muted); font-size: var(--fs-small); }
.pathway i { color: var(--russet-dark); font-family: var(--serif); font-size: 1.75rem; font-style: normal; }
.narrow-figure { width: min(100%, 920px); }
.teaching-readout { margin-top: 34px; }
.mechanism-values { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0; border-top: 1px solid var(--line-dark); border-bottom: 1px solid var(--line-dark); }
.mechanism-values article { padding: 22px 20px 24px; border-right: 1px solid var(--line); }
.mechanism-values article:last-child { border-right: 0; }
.mechanism-values span { color: var(--muted); font-size: var(--fs-label); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.mechanism-values strong { display: block; margin: 12px 0 8px; font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.mechanism-values p { margin: 0; color: var(--muted); font-size: var(--fs-small); }
.mechanism-values .diagnostic { background: rgba(29, 37, 40, .025); }
.mechanism-values .authoritative { border-top: 4px solid var(--russet); padding-top: 18px; }
.meaning-note { display: grid; grid-template-columns: .28fr .72fr; gap: 30px; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-small); }
.meaning-note strong { color: var(--ink); }
.meaning-note p { margin: 0; max-width: 720px; }
.transmission-handshake { margin: 0 0 40px; padding: 22px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.transmission-handshake > p:not(.eyebrow):not(.transmission-equation) { max-width: 940px; margin-bottom: 20px; color: var(--muted); font-size: var(--fs-body); }
.transmission-handshake dl { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin: 0; }
.transmission-handshake dl div { min-width: 0; padding-left: 12px; border-left: 2px solid var(--russet-soft); }
.transmission-handshake dd { color: var(--ink); font-size: var(--fs-small); }
.transmission-equation { margin: 22px 0 0; color: var(--ink); font-family: var(--serif); font-size: var(--fs-accent); }

.frontier-summary { display: flex; justify-content: space-between; gap: 30px; margin-bottom: 24px; padding: 13px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: var(--fs-small); }
.frontier-summary span { color: var(--muted); }
.linked-maps { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: clamp(24px, 4vw, 60px); }
.design-inspection { display: flex; justify-content: space-between; gap: 24px; align-items: end; min-height: 135px; margin-top: 36px; padding: 22px 0 0; border-top: 1px solid var(--ink); }
#design-inspector { flex: 1; }
#design-inspector > p { margin-bottom: 0; color: var(--muted); }
#design-inspector dl { display: grid; grid-template-columns: repeat(7, minmax(90px, 1fr)); gap: 15px; margin: 0; }
#design-inspector dl div { min-width: 0; }
dt { color: var(--muted); font-size: var(--fs-label); font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
dd { margin: 3px 0 0; font-family: var(--serif); font-size: var(--fs-body); font-variant-numeric: tabular-nums; }

.table-wrap { overflow-x: auto; border-top: 1px solid var(--ink); }
table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: var(--fs-small); }
th, td { padding: 16px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
thead th { color: var(--muted); font-size: var(--fs-label); letter-spacing: .1em; text-transform: uppercase; }
tbody th { width: 21%; font-family: var(--serif); font-size: var(--fs-body); font-weight: 400; }
tbody td:nth-child(2), tbody td:nth-child(4) { width: 18%; color: var(--russet-dark); }

.controls-and-provenance { padding-top: 0; border-top: 0; }
details { border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
summary { display: flex; justify-content: space-between; gap: 30px; padding: 20px 0; cursor: pointer; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary span { font-family: var(--serif); font-size: var(--fs-h3); }
summary span::before { content: "+"; display: inline-block; width: 28px; color: var(--russet); }
details[open] summary span::before { content: "−"; }
summary small { max-width: 520px; color: var(--muted); font-size: var(--fs-micro); }
.advanced-body { padding: 20px 0 45px; }
fieldset { margin: 0 0 40px; padding: 22px 0 0; border: 0; border-top: 1px solid var(--line); }
legend { padding-right: 20px; font-family: var(--serif); font-size: var(--fs-accent); }
fieldset > p { color: var(--muted); font-size: var(--fs-small); }
.advanced-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px 26px; }
.product-parameter-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
.parameter-context { display: grid; grid-template-columns: repeat(3, auto 1fr); gap: 6px 14px; align-items: baseline; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-micro); }
.parameter-context strong { color: var(--ink); font-family: var(--serif); font-size: var(--fs-body); font-weight: 400; }
.catalog-note { padding: 18px 0; color: var(--muted); }
.fixed-values { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 18px; margin: 0; }

.closing { padding-bottom: 70px; }
.assumptions-list { columns: 2; column-gap: 55px; padding-left: 20px; }
.assumptions-list li { break-inside: avoid; margin-bottom: 12px; padding-left: 5px; color: var(--muted); font-size: var(--fs-small); }
.uncertainty-note { margin: 26px 0 0; padding: 16px 0 16px 18px; border-left: 3px solid var(--russet); color: var(--muted); font-size: var(--fs-small); }
.exports { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--ink); }
.exports h3 { margin-bottom: 5px; }
.exports > p { max-width: 740px; color: var(--muted); font-size: var(--fs-small); }
.export-actions { display: flex; flex-wrap: wrap; gap: 8px; }
#export-status { min-height: 24px; margin-top: 14px; color: var(--muted); font-size: var(--fs-micro); overflow-wrap: anywhere; }
.site-footer { display: flex; justify-content: space-between; gap: 30px; padding: 26px 0 40px; border-top: 1px solid var(--ink); color: var(--muted); font-size: var(--fs-micro); }
.site-footer p { margin: 0; }

/* Scientific charts reserve blue--near-white--red for the R_loc surface only. */
.plot-bg { fill: var(--paper-deep); }
.grid-line { stroke: var(--ink); stroke-width: .7; stroke-opacity: .13; }
.tick-mark { stroke: var(--ink); stroke-width: 1; }
.tick, .anchor-label, .hybrid-label, .surface-legend, .chart-key { fill: var(--muted); font-family: var(--sans); font-size: 12px; }
.axis-label { fill: var(--ink); font-family: var(--sans); font-size: 14px; font-weight: 800; }
.chart-kicker { fill: var(--focus); font-family: var(--sans); font-size: 11.5px; font-weight: 800; letter-spacing: 1.4px; }
.chart-title { fill: var(--ink); font-family: var(--serif); font-size: 20px; font-weight: 600; }
.teaching-panel-title { fill: var(--ink); font-family: var(--serif); font-size: 17px; font-weight: 600; }
.teaching-panel-note, .teaching-reference-dose-label { fill: var(--muted); font-family: var(--sans); font-size: 11px; }
.teaching-y-label { fill: var(--ink); font-family: var(--sans); font-size: 12px; }
.teaching-panel-bg { stroke: var(--line); stroke-width: 1; }
.teaching-reference { fill: none; stroke: #F85C02; stroke-width: 3; stroke-dasharray: 6 4; vector-effect: non-scaling-stroke; }
.teaching-candidate { fill: none; stroke: #6C1446; stroke-width: 3; vector-effect: non-scaling-stroke; }
.teaching-reference-dose { stroke: var(--focus); stroke-width: 1.6; stroke-dasharray: 4 3; vector-effect: non-scaling-stroke; }
.teaching-legend { fill: var(--muted); font-family: var(--sans); font-size: 13px; }
.teaching-chart-mobile { display: none; }
.immunity-reference { fill: #F85C02; }
.immunity-candidate { fill: #6C1446; }
.immunity-chart-mobile { display: none; }
.surface-cell, .design-cell { stroke: none; }
.surface-cell.is-inspected { stroke: #6C1446; stroke-width: 2; vector-effect: non-scaling-stroke; }
.threshold-line { fill: none; stroke: #111; stroke-width: 2.2; stroke-dasharray: 7 5; vector-effect: non-scaling-stroke; }
.pareto-line { fill: none; stroke: #295958; stroke-width: 3.4; vector-effect: non-scaling-stroke; paint-order: stroke; }
.side-label { fill: var(--ink); font-size: 12px; font-weight: 800; letter-spacing: .7px; paint-order: stroke; stroke: rgba(247,247,242,.85); stroke-width: 3px; }
.anchor-point { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.decision-anchor { fill: var(--ink); }
.hybrid-anchor { stroke: #9B320D; stroke-dasharray: 3 2; }
.probe-ring { fill: none; stroke: var(--focus); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.decision-scope-boundary { fill: none; stroke: #6C1446; stroke-width: 3; stroke-dasharray: 8 4; vector-effect: non-scaling-stroke; }
.hybrid-interval { stroke: #9B320D; stroke-width: 4; stroke-linecap: round; }
.chart-readout rect { fill: rgb(255 255 255 / .91); stroke: var(--ink); stroke-width: .8; }
.chart-readout text { fill: var(--ink); font-size: 12px; }
.chart-readout text:first-of-type { fill: var(--focus); font-weight: 800; letter-spacing: 1px; }
.interpolation-note { fill: var(--muted); font-size: 11.5px; font-style: italic; }
.effect-point { vector-effect: non-scaling-stroke; }
.effect-point.passes { fill: var(--ink); stroke: none; opacity: .9; }
.effect-point.fails { fill: none; stroke: var(--ink); stroke-width: .7; stroke-opacity: .4; }
.comparator-marker { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.comparator-label, .selection-label { fill: var(--ink); font-size: 12px; paint-order: stroke; stroke: var(--paper); stroke-width: 3px; }
.selected-exact { fill: none; stroke: var(--focus); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.nearest-grid { fill: none; stroke: #9B320D; stroke-width: 2; vector-effect: non-scaling-stroke; }
.design-cell.is-inspected, .effect-point.is-inspected { stroke: #6C1446; stroke-width: 3; opacity: 1; }
.design-cell.is-persistent, .effect-point.is-persistent { stroke: var(--focus); stroke-width: 3; opacity: 1; }
.empty-frontier { fill: var(--error); font-family: var(--serif); font-size: 16px; paint-order: stroke; stroke: var(--paper); stroke-width: 4px; }

@media (max-width: 980px) {
  .opening { grid-template-columns: 1fr; }
  .decision-controls { max-width: 720px; padding: 28px 0 0; border-left: 0; border-top: 1px solid var(--line-dark); }
  .chapter-heading { grid-template-columns: 1fr; gap: 10px; }
  .chapter-number { margin-bottom: 0; }
  .linked-maps { gap: 20px; }
  .mechanism-values { grid-template-columns: repeat(2, 1fr); }
  .mechanism-values article:nth-child(2) { border-right: 0; }
  .mechanism-values article:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(3, minmax(90px, 1fr)); }
  .advanced-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .product-parameter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .fixed-values { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .control-row { grid-template-columns: 1fr 1fr; }
  .control-row > :first-child { grid-column: 1 / -1; }
  .setting-controls .control-row { grid-template-columns: 1fr 1fr; }
  .setting-controls .control-row > :first-child { grid-column: auto; }
  .pathway { grid-template-columns: 1fr 1fr; gap: 22px; }
  .pathway i { display: none; }
}

@media (max-width: 720px) {
  .site-header { gap: 12px; }
  .site-header nav { min-width: 0; overflow-x: auto; gap: 16px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .site-header nav::-webkit-scrollbar { display: none; }
  .site-header nav a { white-space: nowrap; }
  .hero { min-height: auto; padding-top: 80px; }
  .prototype-banner { align-items: flex-start; flex-direction: column; gap: 4px; }
  .opening-meta { grid-template-columns: 1fr; gap: 14px; }
  .opening-comparison { grid-template-columns: 1fr; gap: 14px; }
  .opening-comparison i { display: none; }
  .chapter { padding-block: 72px; }
  .teaching-chart { display: none; }
  .teaching-chart-mobile { display: block; }
  .immunity-chart { display: none; }
  .immunity-chart-mobile { display: block; }
  .motif { grid-template-columns: 1fr; }
  .motif i { transform: rotate(90deg); text-align: center; line-height: .6; }
  .motif article { min-height: 0; }
  .pathway { grid-template-columns: 1fr; }
  .pathway article { min-height: 0; }
  .narrative-controls { margin-top: 34px; }
  .linked-maps { grid-template-columns: 1fr; }
  .frontier-summary { flex-direction: column; gap: 4px; }
  .meaning-note { grid-template-columns: 1fr; gap: 8px; }
  .transmission-handshake dl { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .assumptions-list { columns: 1; }
  summary { flex-direction: column; gap: 6px; }
  .site-footer { flex-direction: column; gap: 8px; }
}

@media (max-width: 480px) {
  .app-shell, .site-footer { width: calc(100% - 28px); }
  .opening > *, .chapter-heading > *, .controls-title > *, .control-row > *, .opening-meta > *, .linked-maps > *, .design-inspection > *, .mechanism-values > * { min-width: 0; }
  h1 { font-size: clamp(2.2rem, 11vw, 3.4rem); }
  h2 { font-size: 1.9rem; }
  .opening { padding-top: 30px; }
  .control-pair, .advanced-grid, .product-parameter-grid { grid-template-columns: 1fr; }
  .control-row, .setting-controls .control-row { grid-template-columns: 1fr; }
  .control-row > :first-child, .setting-controls .control-row > :first-child { grid-column: auto; }
  .result-number { grid-template-columns: 1fr; gap: 6px; }
  .result-number strong, .result-number span:first-child, .result-number span:last-child { grid-column: 1; grid-row: auto; }
  .result-number span:first-child { order: -1; }
  .mechanism-values { grid-template-columns: 1fr; }
  .mechanism-values article { border-right: 0; border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .design-inspection { align-items: stretch; flex-direction: column; }
  .fixed-values { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .parameter-context { grid-template-columns: 1fr; gap: 2px; }
  .transmission-handshake dl { grid-template-columns: 1fr; }
  .chart-slot { max-width: 100%; overflow-x: clip; }
  .scientific-chart { max-width: 100%; overflow: hidden; }
  .site-footer p, .prototype-banner span, #export-status { overflow-wrap: anywhere; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

@media (forced-colors: active) {
  .surface-cell, .design-cell { forced-color-adjust: none; }
  .threshold-line, .pareto-line, .anchor-point, .selected-exact, .effect-point { stroke: CanvasText; }
  .effect-point.passes, .decision-anchor { fill: CanvasText; }
  .effect-point.fails { fill: Canvas; }
}

@media print {
  .site-header, .decision-controls, .narrative-controls, .control-actions, .controls-and-provenance, .export-actions, .transaction-status { display: none !important; }
  .print-product-summary { display: block; margin: 18px 0 24px; padding: 16px 0; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--line); font-size: var(--fs-small); }
  .print-product-summary dl { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 24px; margin: 0 0 14px; }
  .print-product-summary dl div { min-width: 0; }
  .print-product-summary dd { font-size: var(--fs-small); }
  .print-product-summary p:last-child { max-width: 820px; margin-bottom: 0; color: var(--muted); }
  body { background: white; }
  .app-shell, .site-footer { width: 100%; }
  .hero { min-height: 0; padding-top: 20px; }
  .chapter { break-inside: avoid; padding-block: 35px; }
  #story-results.is-stale { opacity: 1; filter: none; }
}
</style>

  <header class="site-header"><a class="wordmark" href="#top" aria-label="Polio vaccine target product profile explorer home">TPP / WPV1</a><nav aria-label="Narrative chapters"><a href="#within-host">Model</a><a href="#product-pathway">Product</a><a href="#transmission">Transmission</a><a href="#decision">Decision</a><a href="#measurement">Measurement</a></nav></header>
  <main id="top" class="app-shell">
    <header class="hero">
      <p class="eyebrow">WPV1 \xB7 close-contact sufficiency model \xB7 contract ${v.designContractVersion}</p>
      <h1>Under what conditions can a vaccine block close-contact transmission?</h1>
      <p class="lede">Begin with a child exposed to WPV in the UP/Bihar reference setting. Follow the model from schedule-derived immunity, through acquisition and shedding, into a close-contact transmission motif\u2014then ask what product properties clear that stress test.</p>
      <p id="opening-comparison" class="opening-comparison" aria-live="off"></p>
      <aside class="prototype-banner" role="note"><strong>Scientific prototype \xB7 point rule</strong><span>This is a deterministic close-contact sufficiency screen under the v1 axiom\u2014not a complete-population R<sub>e</sub>, outbreak forecast, or probability of product success.</span></aside>
    </header>

    <section id="within-host" class="chapter teaching-chapter" aria-labelledby="within-host-heading">
      <div class="chapter-heading"><p class="chapter-number">01 / WPV exposure</p><div><h2 id="within-host-heading">First, separate acquisition from what happens after breakthrough.</h2><p>UP/Bihar is the fixed teaching reference for the transmission setting, not a different WPV biology. The curves below compare a naive reference cohort with the selected vaccine schedule at the same assessment age.</p></div></div>
      <figure class="hero-figure"><div id="within-host-chart" class="chart-slot" aria-live="off"></div><figcaption><strong>Read each conditioning statement literally.</strong> Acquisition depends on WPV challenge dose. The next three panels condition on acquisition; daily burden is survival multiplied by concentration conditional on still shedding. This preserves the joint expectation rather than averaging an "average child."</figcaption></figure>
      <div id="within-host-readout" class="mechanism-values teaching-readout"></div>
    </section>

    <section id="product-pathway" class="chapter" aria-labelledby="product-pathway-heading">
      <div class="chapter-heading"><p class="chapter-number">02 / Schedule to cohort</p><div><h2 id="product-pathway-heading">A received live-vaccine dose may take, boost mucosal immunity, and then wane.</h2><p>Every routine dose is received in v1. Biological take is productive live-vaccine infection after receipt; it is not receipt, coverage, or direct protection against a WPV dose. Repeated take/no-take branches produce the cohort distribution shown here.</p></div></div>
      <div class="pathway" role="img" aria-label="Received dose, biological take or no take, mucosal boost, waning, and the cohort immunity distribution before WPV exposure"><article><span>Received dose</span><strong>Schedule event</strong><p>Routine doses at 6, 10, and 14 weeks, plus an optional booster.</p></article><i aria-hidden="true">\u2192</i><article><span>Biological split</span><strong>Take / no take</strong><p>Each branch is probability weighted; no dose receipt is missing.</p></article><i aria-hidden="true">\u2192</i><article><span>State transition</span><strong>Boost then wane</strong><p>Take changes mucosal state; time to assessment allows waning.</p></article><i aria-hidden="true">\u2192</i><article><span>WPV challenge</span><strong>Distribution enters model</strong><p>Transmission uses the full state distribution and histories.</p></article></div>
      <p id="product-pathway-summary" class="narrative-summary"></p>
      <aside id="print-product-summary" class="print-product-summary" aria-label="Selected product mechanism for print"></aside>
      <figure class="hero-figure narrow-figure"><div id="immunity-distribution" class="chart-slot"></div><figcaption><strong>This is a marginal view, not the calculation's state reduction.</strong> The model retains conditioned take/no-take history and uses each group's dose response and shedding kernel directly.</figcaption></figure>
      <form class="narrative-controls" aria-labelledby="product-controls-heading" onsubmit="return false"><div class="controls-title"><div><p class="eyebrow">Product and schedule</p><h3 id="product-controls-heading">Now choose the schedule whose cohort you want to inspect.</h3></div><button id="reset" type="button" class="text-button">Reset defaults</button></div><div class="control-row"><label>Candidate product<select id="product">${i}</select><small>Fixed catalog products remain fixed; hypothetical OPV-like designs expose their assumptions below.</small></label><label>Booster<select id="booster" data-model-control><option value="0">No booster</option><option value="1">At 1 year</option><option value="2">At 2 years</option><option value="3">At 3 years</option><option value="4">At 4 years</option></select><small>An extra dose on top of the routine 6/10/14-week schedule.</small></label><label>Assessment after last dose<select id="lag" data-model-control><option value="28">28 days</option><option value="90">90 days</option></select></label></div><fieldset id="hypothetical-controls"><legend>Hypothetical OPV-like product mechanism</legend><p>These values determine vaccine take after a received dose, the take/no-take split, the mucosal boost, and therefore the schedule-derived distribution above. They do not change the fixed WPV challenge equation.</p><div class="advanced-grid product-parameter-grid"><label>Biological take <output id="take-output">0.80</output><input id="take" data-model-control type="range" min="0" max="1" step="0.01"><small id="take-help"></small></label><label>Latent mean mucosal boost <output id="mu-output">4.0 log2</output><input id="mu" data-model-control type="range" min="0" max="8" step="0.1"><small id="mu-help"></small></label><label>Vaccine \u03B1<input id="alpha" data-model-control type="number" min="0.001" max="5" step="0.001"><small>Dose-response shape for productive vaccine infection after receipt.</small></label><label>Vaccine \u03B2 (CID50)<input id="beta" data-model-control type="number" min="0.001" max="1000000" step="0.1"><small>Dose-response scale; not a WPV susceptibility parameter.</small></label><label>Administered dose (log10 TCID50)<input id="dose-log" data-model-control type="number" min="0" max="9" step="0.01"><small>Amount offered per received live-vaccine dose.</small></label></div><div class="parameter-context"><span>Fixed \u03B3<sub>vax</sub></span><strong id="product-fixed-gamma"></strong><span>Fixed boost SD, \u03C3<sub>0</sub></span><strong id="product-fixed-sigma"></strong><span>Receipt</span><strong>100% in v1</strong></div></fieldset><p id="catalog-product-note" class="catalog-note" hidden></p><p id="state-warning" class="warning" hidden></p><div class="control-actions"><button id="compute" class="primary" type="button">Update the model</button><span id="compute-status" role="status" aria-live="polite"></span></div></form>
    </section>

    <section id="transmission" class="chapter" aria-labelledby="mechanism-heading">
      <div class="chapter-heading"><p class="chapter-number">03 / Close-contact transmission</p><div><h2 id="mechanism-heading">Then put breakthrough shedding into one declared transmission motif.</h2><p>The model propagates a breakthrough index child to a household child, then to close social contacts. Its endpoint is the expected tertiary infections, R<sub>loc</sub>, for that motif\u2014not a calculated complete-population R<sub>e</sub>.</p></div></div>
      <div class="motif" role="img" aria-label="Index child transmits to a household child, who connects to close social contacts">
        <article><span>01</span><strong>Index child</strong><p>Breakthrough infection and infectious shedding after the selected schedule.</p></article><i aria-hidden="true">\u2192</i><article><span>02</span><strong>Household child</strong><p>Acquisition is propagated through the full modeled immunity distribution.</p></article><i aria-hidden="true">\u2192</i><article><span>03</span><strong>Close social contacts</strong><p>N<sub>s</sub> family-like child contacts extend the local motif.</p></article>
      </div>
      <div class="transmission-handshake"><p class="eyebrow">What happens on each link</p><p><strong>Infectious survival and stool concentration</strong> from the index child, multiplied by <strong>grams of stool per exposure</strong>, determine a recipient's daily oral WPV dose. The recipient's full immunity distribution determines acquisition at that dose. Repeated daily exposures compose as cumulative escape, not as one exposure to an average child.</p><dl><div><dt>UP/Bihar index \u2192 household</dt><dd>${ho(e.Tih.value)} \xB5g stool-equivalent/exposure \xD7 ${po(e.dIh.value)}</dd></div><div><dt>Household \u2192 social contact</dt><dd>${ho(e.Ths.value)} \xB5g stool-equivalent/exposure \xD7 ${po(e.dHs.value)}</dd></div><div><dt>Social-contact motif</dt><dd>N<sub>s</sub> = ${e.Ns} family-like child contacts</dd></div><div><dt>Index conditioning</dt><dd>Actual breakthrough after one WPV HID50, not a random vaccinated child</dd></div></dl><p class="transmission-equation">R<sub>loc</sub> = N<sub>s</sub> \xD7 P(one close social contact is infected).</p></div>
      <div id="mechanism-values" class="mechanism-values"></div>
      <aside class="meaning-note"><strong>The decision step</strong><p>If the direct motif result is below one at the declared setting scope, the v1 sufficiency axiom treats that as a demanding local stress test. q<sub>index</sub> helps read the within-host effects but cannot replace the distribution-native motif calculation.</p></aside>
    </section>

    <section id="decision" class="chapter surface-chapter" aria-labelledby="decision-heading">
      <div class="chapter-heading"><p class="chapter-number">04 / Setting and decision</p><div><h2 id="decision-heading">Only now ask whether the selected product clears the reference stress test.</h2><p>The default point rule is evaluated directly at the UP/Bihar high anchor, the hardest known empirical/model-calibrated setting in the catalog. Clearing it supports likely adequacy under less demanding modeled conditions; it does not prove control everywhere.</p></div></div>
      <div id="story-results"><div id="result-status" class="result-status pending" aria-live="polite"><p class="result-label">Evaluating</p><h2>Calculating the versioned default\u2026</h2></div><div class="opening-meta"><p id="candidate-summary"></p><p id="scope-summary"></p><p id="probe-summary"></p></div></div>
      <form class="narrative-controls setting-controls" aria-labelledby="setting-controls-heading" onsubmit="return false"><div class="controls-title"><div><p class="eyebrow">Setting semantics</p><h3 id="setting-controls-heading">Keep the decision scope separate from an inspection probe.</h3></div></div><div class="control-row"><label>Inspection probe<select id="probe">${r}</select><small>Changes the independent readout and its ring on the figure, not the decision result or model identity.</small></label><label>Decision scope<select id="scope">${o}</select><small>Directly determines the reported maximum R<sub>loc</sub>.</small></label></div></form>
      <figure class="hero-figure"><div id="setting-map" class="chart-slot" aria-live="off"></div><figcaption><strong>Read from blue through white to red.</strong> White is R<sub>loc</sub> = 1. The diamond is the decision anchor; the ring is the independent inspection probe. The outlined cell is the display cell you are inspecting, and its readout is that raster cell \u2014 not the decision calculation. The dashed path marks threshold crossings between directly evaluated display cells. Hover or use arrow keys to move the inspected cell across all 81 \xD7 20 cells.</figcaption></figure>
      <p id="transaction-status" class="transaction-status" role="status" aria-live="polite"></p>
    </section>

    <section id="measurement" class="chapter" aria-labelledby="measurement-heading">
      <div class="chapter-heading"><p class="chapter-number">05 / Measurement handshake</p><div><h2 id="measurement-heading">What the quantities mean\u2014and what they do not measure.</h2><p>The table connects product assumptions, field setting anchors, inherited model structure, and derived results before returning to the design space.</p></div></div>
      <div class="table-wrap"><table><thead><tr><th>Quantity</th><th>Scientific role</th><th>Measurement interpretation</th><th>Status in v1</th></tr></thead><tbody>
        <tr><th scope="row">Biological take context</th><td>Product property</td><td>Productive live-vaccine infection after a received dose; not receipt or coverage.</td><td>Scenario input</td></tr>
        <tr><th scope="row">Mean mucosal boost, \u03BC<sub>0</sub></th><td>Product property</td><td>Latent OPV-equivalent mucosal immunity shift; not measured serum titer.</td><td>Scenario input</td></tr>
        <tr><th scope="row">Exposure, T<sub>ih</sub> / T<sub>hs</sub></th><td>Setting pressure</td><td>Stool-equivalent mass transferred per exposure, converted at the UI boundary.</td><td>Named anchor or custom input</td></tr>
        <tr><th scope="row">Contact frequency and N<sub>s</sub></th><td>Motif structure</td><td>Exposures per person-day and family-like close social contacts.</td><td>Calibrated, inherited, or declared</td></tr>
        <tr><th scope="row">WPV acquisition, P(acquisition | d)</th><td>Within-host response</td><td>Probability of productive WPV acquisition after oral challenge dose d in CID50.</td><td>Derived model output</td></tr>
        <tr><th scope="row">Shedding duration</th><td>Within-host response</td><td>P(still shedding at day t | WPV acquisition); probability by days after acquisition.</td><td>Derived model output</td></tr>
        <tr><th scope="row">Concentration among shedders</th><td>Within-host response</td><td>Expected TCID50/g | still shedding and WPV acquisition, at the stated assessment age; assay floor 10<sup>${t}</sup> TCID50/g.</td><td>Derived model output</td></tr>

        <tr><th scope="row">q<sub>acq</sub>, q<sub>shed</sub></th><td>Modeled effects</td><td>Residual acquisition and conditional infectious-shedding multipliers at one WPV HID50. q<sub>shed</sub> is conditional on acquisition.</td><td>Derived from distributions</td></tr>

    <section id="design-space" class="chapter" aria-labelledby="design-heading">
      <div class="chapter-heading"><p class="chapter-number">06 / From requirement to product</p><div><h2 id="design-heading">The same evaluated products can be read in outcome space or product space.</h2><p>Outcome space shows the acquisition-blocking and breakthrough-shedding reductions achieved by each evaluated product. Product space shows the biological take context and latent mucosal boost assumptions that generated them. Neither outcome axis is an independently tunable specification.</p></div></div>
      <div id="frontier-summary" class="frontier-summary"></div>
      <div class="linked-maps"><figure><div id="effect-map" class="chart-slot"></div><figcaption><strong>Outcome requirement space.</strong> Each mark is one evaluated product. The turquoise <strong>Pareto boundary</strong> traces the minimum-sufficient frontier \u2014 the least acquisition and breakthrough-shedding reduction that still clears R<sub>loc</sub> &lt; 1 at the decision scope. Designs on it (or up and to the right) meet the criterion; designs below and left do not. It summarizes evaluated combinations, not a new biological endpoint.</figcaption></figure><figure><div id="product-map" class="chart-slot"></div><figcaption><strong>Product-assumption space.</strong> The dashed contour is the same sufficiency boundary in design coordinates: designs beyond it (higher take and mean boost) clear the criterion. Take is productive biological infection after a received live dose. Mean boost is latent OPV-equivalent mucosal immunity, not serum titer.</figcaption></figure></div>
