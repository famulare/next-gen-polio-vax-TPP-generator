<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src data:;">
<title>Next-generation polio vaccine TPP generator</title>
<style>:root {
  color-scheme: light;
  --paper: #F5F3ED;
  --paper-deep: #FFFFFF;
  --ink: #313A44;
  --muted: rgb(49 58 68 / 78%);
  --faint: rgb(49 58 68 / 52%);
  --line: rgb(49 58 68 / 28%);
  --line-dark: rgb(49 58 68 / 65%);
  --accent: #EBCB00;
  --russet: #6C1446;
  --russet-dark: #6C1446;
  --russet-soft: rgb(108 20 70 / 24%);
  --focus: #12236D;
  --error: #771109;
  --surface-blue: #2166AC;
  --white-map: #F7F7F2;
  --surface-red: #B2182B;
  --serif: "Noto Serif", Georgia, serif;
  --sans: "Noto Sans", Arial, sans-serif;
  /* Type scale: three headings (display/h2/h3), a serif accent, two intro sizes
     (lede/intro), and the body size, which is the floor — nothing renders
     smaller; labels and eyebrows carry hierarchy through weight and caps. */
  --fs-display: clamp(2.5rem, 4.6vw, 4.2rem);
  --fs-h2: clamp(1.7rem, 3.2vw, 2.9rem);
  --fs-h3: 1.5rem;
  --fs-accent: 1.3rem;
  --fs-lede: clamp(1.12rem, 1.5vw, 1.35rem);
  --fs-intro: 1.18rem;
  --fs-body: 1.02rem;
  /* Layout spine: one page shell, a left-anchored reading column for headings,
     prose, controls, and conclusions, and a wider breakout for the few figures
     whose interpretation needs simultaneous width. */
  --page-max: 1240px;
  --gutter: clamp(28px, 7vw, 96px);
  --reading: 48rem;
  --wide: 72rem;
  /* Compact spacing scale (flow rhythm within sections; larger steps between). */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 14px;
  --space-4: 22px;
  --space-5: 36px;
  --space-6: 60px;
  --space-7: clamp(66px, 10vw, 130px);
  font-family: var(--sans);
  font-synthesis: none;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--paper); color: var(--ink); line-height: 1.55; font-size: var(--fs-body); }
button, input, select { font: inherit; }
a { color: inherit; text-underline-offset: .2em; }
[hidden] { display: none !important; }

.skip-link { position: fixed; z-index: 30; top: 8px; left: 8px; transform: translateY(-160%); background: var(--ink); color: var(--paper); padding: 8px 12px; }
.skip-link:focus { transform: none; }
.site-header { position: sticky; z-index: 20; top: 0; display: flex; align-items: center; justify-content: space-between; min-height: 54px; padding: 0 clamp(16px, 4vw, 58px); border-bottom: 1px solid var(--ink); background: var(--accent); }
.wordmark { flex: 0 0 auto; white-space: nowrap; font-weight: 800; letter-spacing: .12em; text-decoration: none; font-size: var(--fs-body); }
.site-header nav { display: flex; gap: clamp(12px, 2vw, 28px); font-size: var(--fs-body); }
.site-header nav a { color: rgb(49 58 68 / 85%); text-decoration: none; }
.site-header nav a:hover { color: var(--ink); }

/* .app-shell is the page shell: outer max width plus responsive gutters. */
.app-shell, .site-footer { width: min(var(--page-max), calc(100% - var(--gutter))); margin-inline: auto; }
/* Layout primitives. .content-column is the reading measure and common left edge;
   .wide-breakout extends rightward from that same left edge for comparison figures;
   .flow gives vertical rhythm with a configurable gap. */
.content-column { width: 100%; max-width: var(--reading); margin-inline: 0 auto; }
.wide-breakout { width: 100%; max-width: var(--wide); margin-inline: 0 auto; }
.flow > * + * { margin-top: var(--flow-gap, var(--space-4)); }
.hero { min-height: 42vh; display: flex; flex-direction: column; justify-content: flex-end; max-width: 1020px; padding: clamp(70px, 12vw, 150px) 0 58px; }
.eyebrow, .chapter-number, .result-label, .inspector-label { margin: 0 0 10px; color: var(--focus); font-size: var(--fs-body); font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1, h2, h3 { font-family: var(--serif); }
h1, h2 { font-weight: 600; }
h3 { font-weight: 400; }
h1 { max-width: 980px; margin-bottom: 24px; font-size: var(--fs-display); line-height: 1.05; letter-spacing: -.035em; }
h2 { margin-bottom: 14px; font-size: var(--fs-h2); line-height: 1.16; letter-spacing: -.02em; }
h3 { font-size: var(--fs-h3); }
.lede { max-width: 760px; margin-bottom: 28px; color: var(--muted); font-family: var(--serif); font-size: var(--fs-lede); }
.orienting { max-width: 860px; margin: 0 0 28px; color: var(--muted); font-size: var(--fs-body); line-height: 1.6; }
.orienting strong { color: var(--ink); }
.opening-comparison { display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1.2fr); gap: 6px 20px; align-items: stretch; max-width: 960px; margin: 0 0 22px; padding: 12px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: var(--fs-body); }
.opening-comparison .cohort { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.opening-comparison .cohort-tag { color: var(--russet-dark); font-size: var(--fs-body); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.opening-comparison strong { font-weight: 600; }
.opening-comparison i { align-self: center; color: var(--russet); font-family: var(--serif); font-size: var(--fs-accent); font-style: normal; }
.prototype-banner { display: flex; gap: 14px; align-items: baseline; max-width: 840px; padding-top: 13px; border-top: 4px solid var(--accent); color: var(--muted); font-size: var(--fs-body); }
.prototype-banner strong { flex: 0 0 auto; color: var(--ink); }
.prov-tag { display: inline-block; padding: 1px 7px; border: 1px solid var(--line-dark); border-radius: 0; font-size: var(--fs-body); font-weight: 800; letter-spacing: .05em; text-transform: uppercase; color: var(--ink); white-space: nowrap; vertical-align: middle; }
.prov-tag[data-kind="measured"] { background: rgb(33 102 172 / 13%); }
.prov-tag[data-kind="derived"] { background: rgb(41 89 88 / 15%); }
.prov-tag[data-kind="scenario-input"] { background: rgb(235 203 0 / 26%); }
.prov-tag[data-kind="assumption"] { background: rgb(49 58 68 / 9%); }
.prov-tag[data-kind="not-measured"] { background: rgb(178 24 43 / 11%); border-style: dashed; }

.opening { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(290px, .55fr); gap: clamp(32px, 6vw, 90px); align-items: start; padding: 44px 0 52px; border-top: 1px solid var(--ink); }
#story-results { min-width: 0; margin-top: 40px; transition: opacity .15s ease, filter .15s ease; }
#story-results.is-stale { opacity: .52; filter: grayscale(.65); }
.result-status { padding: 0 0 30px; border-bottom: 1px solid var(--line); }
.result-status h2 { max-width: 760px; }
.result-status.fail h2, .result-status.tie h2 { color: var(--error); }
.result-number { display: grid; grid-template-columns: auto 1fr; gap: 0 18px; align-items: end; width: fit-content; margin: 26px 0 24px; font-size: var(--fs-body); color: var(--muted); }
.result-number strong { grid-row: span 2; grid-column: 1; color: var(--ink); font-family: var(--serif); font-size: clamp(3.8rem, 8vw, 7rem); font-weight: 400; line-height: .8; font-variant-numeric: tabular-nums; }
.result-number span:first-child { grid-column: 2; align-self: end; color: var(--ink); font-weight: 750; }
.result-number span:last-child { grid-column: 2; max-width: 340px; }
.qualification { max-width: 760px; margin: 0; padding-left: 18px; border-left: 4px solid var(--accent); color: var(--muted); }
.opening-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; padding-top: 20px; }
.opening-meta p { margin: 0; }
.opening-meta span { display: block; margin-bottom: 4px; color: var(--muted); font-size: var(--fs-body); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.opening-meta strong { display: block; font-size: var(--fs-body); line-height: 1.4; }

.decision-controls { padding-left: 26px; border-left: 1px solid var(--line-dark); }
.narrative-controls { max-width: 1020px; margin: 46px auto 0; padding: 24px; border: 1px solid var(--line-dark); background: var(--paper-deep); }
.setting-controls { margin-top: 40px; }
.control-row { display: grid; grid-template-columns: minmax(220px, 1.35fr) repeat(2, minmax(180px, .8fr)); gap: 24px; align-items: start; }
.setting-controls .control-row { grid-template-columns: repeat(2, minmax(220px, 1fr)); max-width: 720px; }
.narrative-summary { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline; margin: 0 0 30px; padding: 13px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); color: var(--muted); font-size: var(--fs-body); }
.narrative-summary strong { color: var(--ink); font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.print-product-summary { display: none; }
.controls-title { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.controls-title h2 { font-family: var(--serif); font-size: var(--fs-h3); }
label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; font-size: var(--fs-body); font-weight: 750; letter-spacing: .02em; }
label small { color: var(--muted); font-size: var(--fs-body); font-weight: 400; line-height: 1.4; letter-spacing: 0; }
select, input[type="number"] { width: 100%; min-height: 42px; padding: 8px 9px; border: 1px solid var(--line-dark); border-radius: 0; background: var(--paper-deep); color: var(--ink); }
select:hover, input[type="number"]:hover { border-color: var(--ink); }
input[type="range"] { width: 100%; accent-color: var(--russet); }
output { align-self: flex-end; color: var(--russet-dark); font-variant-numeric: tabular-nums; }
.control-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.control-actions { display: flex; gap: 12px; align-items: center; margin-top: 18px; }
.control-actions span { color: var(--muted); font-size: var(--fs-body); }
button { min-height: 40px; padding: 9px 15px; border: 1px solid var(--ink); border-radius: 0; background: transparent; color: var(--ink); cursor: pointer; font-size: var(--fs-body); font-weight: 760; }
button:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
button.primary { background: var(--accent); color: var(--ink); }
button.primary:hover:not(:disabled) { background: var(--ink); border-color: var(--ink); color: var(--paper); }
button.text-button { min-height: auto; padding: 3px 0; border: 0; border-bottom: 1px solid currentColor; color: var(--muted); }
button:disabled { cursor: not-allowed; opacity: .38; }
button:focus-visible, a:focus-visible, summary:focus-visible, select:focus-visible, input:focus-visible, svg:focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; }

.warning { margin: 14px 0 0; padding: 10px 0 10px 14px; border-left: 3px solid var(--russet); color: var(--russet-dark); font-size: var(--fs-body); }
.warning.notice { border-color: var(--line-dark); color: var(--muted); }
.transaction-status { min-height: 44px; margin: 0; padding: 12px 0; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-body); }
.transaction-status.stale, .transaction-status.invalid { color: var(--russet-dark); }

.chapter { padding: var(--space-7) 0; border-top: 1px solid var(--ink); }
/* One spine: every chapter block sits on the left-anchored reading column;
   only .wide-breakout figures extend rightward for simultaneous comparison. */
.chapter > * { max-width: var(--reading); margin-inline: 0 auto; }
.chapter > .wide-breakout { max-width: var(--wide); }
/* The linked-map pair is the widest comparison on the page; it uses the full
   shell rather than the single-figure breakout so both maps stay legible. */
.chapter > .linked-maps.wide-breakout { max-width: none; }
.chapter-heading { margin-bottom: var(--space-6); }
.chapter-heading > div > p { color: var(--muted); font-size: var(--fs-intro); }
.surface-chapter { padding-top: var(--space-6); }
.hero-figure, .linked-maps figure { margin: 0; }
.hero-figure { width: 100%; }
.chart-slot { width: 100%; min-height: 120px; }
.scientific-chart { display: block; width: 100%; height: auto; overflow: visible; }
figcaption { max-width: 880px; margin: 13px 0 0; color: var(--muted); font-size: var(--fs-body); }
figcaption strong { color: var(--ink); }

.pathway { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr; gap: clamp(10px, 2vw, 30px); align-items: center; margin: 18px 0 36px; }
.pathway article { min-height: 152px; padding: 15px 4px 0; border-top: 2px solid var(--ink); }
.pathway article span { color: var(--russet); font-size: var(--fs-body); font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
.pathway article strong { display: block; margin: 10px 0 7px; font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.pathway article p { margin: 0; color: var(--muted); font-size: var(--fs-body); }
.pathway i { color: var(--russet-dark); font-family: var(--serif); font-size: 1.75rem; font-style: normal; }
.narrow-figure { width: min(100%, 920px); }
.teaching-readout { margin-top: 34px; }
.mechanism-values { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0; border-top: 1px solid var(--line-dark); border-bottom: 1px solid var(--line-dark); }
.mechanism-values article { padding: 22px 20px 24px; border-right: 1px solid var(--line); }
.mechanism-values article:last-child { border-right: 0; }
.mechanism-values span { color: var(--muted); font-size: var(--fs-body); font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.mechanism-values strong { display: block; margin: 12px 0 8px; font-family: var(--serif); font-size: var(--fs-accent); font-weight: 400; }
.mechanism-values p { margin: 0; color: var(--muted); font-size: var(--fs-body); }
.mechanism-values .diagnostic { background: rgba(29, 37, 40, .025); }
.mechanism-values .authoritative { border-top: 4px solid var(--russet); padding-top: 18px; }
.meaning-note { display: grid; grid-template-columns: .28fr .72fr; gap: 30px; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-body); }
.meaning-note strong { color: var(--ink); }
.meaning-note p { margin: 0; max-width: 720px; }
.transmission-handshake { margin: 0 0 40px; padding: 22px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.transmission-handshake > p:not(.eyebrow):not(.transmission-equation) { max-width: 940px; margin-bottom: 20px; color: var(--muted); font-size: var(--fs-body); }
.transmission-handshake dl { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin: 0; }
.transmission-handshake dl div { min-width: 0; padding-left: 12px; border-left: 2px solid var(--russet-soft); }
.transmission-handshake dd { color: var(--ink); font-size: var(--fs-body); }
.transmission-equation { margin: 22px 0 0; color: var(--ink); font-family: var(--serif); font-size: var(--fs-accent); }

.frontier-summary { display: flex; justify-content: space-between; gap: 30px; margin-bottom: 24px; padding: 13px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: var(--fs-body); }
.frontier-summary span { color: var(--muted); }
.linked-maps { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: clamp(24px, 4vw, 60px); }
.design-inspection { display: flex; justify-content: space-between; gap: 24px; align-items: end; min-height: 135px; margin-top: 36px; padding: 22px 0 0; border-top: 1px solid var(--ink); }
#design-inspector { flex: 1; }
#design-inspector > p { margin-bottom: 0; color: var(--muted); }
#design-inspector dl { display: grid; grid-template-columns: repeat(7, minmax(90px, 1fr)); gap: 15px; margin: 0; }
#design-inspector dl div { min-width: 0; }
dt { color: var(--muted); font-size: var(--fs-body); font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
dd { margin: 3px 0 0; font-family: var(--serif); font-size: var(--fs-body); font-variant-numeric: tabular-nums; }

.table-wrap { overflow-x: auto; border-top: 1px solid var(--ink); }
table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: var(--fs-body); }
th, td { padding: 16px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
thead th { color: var(--muted); font-size: var(--fs-body); letter-spacing: .1em; text-transform: uppercase; }
tbody th { width: 21%; font-family: var(--serif); font-size: var(--fs-body); font-weight: 400; }
tbody td:nth-child(2), tbody td:nth-child(4) { width: 18%; color: var(--russet-dark); }

.controls-and-provenance { padding-top: 0; border-top: 0; }
details { border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
summary { display: flex; justify-content: space-between; gap: 30px; padding: 20px 0; cursor: pointer; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary span { font-family: var(--serif); font-size: var(--fs-h3); }
summary span::before { content: "+"; display: inline-block; width: 28px; color: var(--russet); }
details[open] summary span::before { content: "−"; }
summary small { max-width: 520px; color: var(--muted); font-size: var(--fs-body); }
.advanced-body { padding: 20px 0 45px; }
fieldset { margin: 0 0 40px; padding: 22px 0 0; border: 0; border-top: 1px solid var(--line); }
legend { padding-right: 20px; font-family: var(--serif); font-size: var(--fs-accent); }
fieldset > p { color: var(--muted); font-size: var(--fs-body); }
.advanced-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px 26px; }
.product-parameter-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
.parameter-context { display: grid; grid-template-columns: repeat(3, auto 1fr); gap: 6px 14px; align-items: baseline; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line); color: var(--muted); font-size: var(--fs-body); }
.parameter-context strong { color: var(--ink); font-family: var(--serif); font-size: var(--fs-body); font-weight: 400; }
.catalog-note { padding: 18px 0; color: var(--muted); }
.fixed-values { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 18px; margin: 0; }

.closing { padding-bottom: 70px; }
.assumptions-list { columns: 2; column-gap: 55px; padding-left: 20px; }
.assumptions-list li { break-inside: avoid; margin-bottom: 12px; padding-left: 5px; color: var(--muted); font-size: var(--fs-body); }
.uncertainty-note { margin: 26px 0 0; padding: 16px 0 16px 18px; border-left: 3px solid var(--russet); color: var(--muted); font-size: var(--fs-body); }
.exports { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--ink); }
.exports h3 { margin-bottom: 5px; }
.exports > p { max-width: 740px; color: var(--muted); font-size: var(--fs-body); }
.export-actions { display: flex; flex-wrap: wrap; gap: 8px; }
#export-status { min-height: 24px; margin-top: 14px; color: var(--muted); font-size: var(--fs-body); overflow-wrap: anywhere; }
.site-footer { display: flex; justify-content: space-between; gap: 30px; padding: 26px 0 40px; border-top: 1px solid var(--ink); color: var(--muted); font-size: var(--fs-body); }
.site-footer p { margin: 0; }

/* Scientific charts reserve blue--near-white--red for the R_loc surface only. */
/* --u is viewBox units per rendered pixel (viewBox width / rendered container width
   at the desktop shell) so every figure's text hits the same on-screen floor via
   calc(px * var(--u)). Standalone exports omit it and fall back to 1. */
#within-host-figure { --u: 1.042; }
#dose-response-figure, #immunity-distribution-figure { --u: 1.068; }
#setting-figure { --u: 0.781; }
#effect-figure, #product-figure { --u: 0.949; }
.motif-svg { --u: 0.911; }
.plot-bg { fill: var(--paper-deep); }
.grid-line { stroke: var(--ink); stroke-width: .7; stroke-opacity: .13; }
.tick-mark { stroke: var(--ink); stroke-width: 1; }
.tick, .anchor-label, .hybrid-label, .surface-legend, .chart-key { fill: var(--muted); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); }
.axis-label { fill: var(--ink); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); font-weight: 800; }
.chart-kicker { fill: var(--focus); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); font-weight: 800; letter-spacing: 1.4px; }
.chart-title { fill: var(--ink); font-family: var(--serif); font-size: calc(22px * var(--u, 1)); font-weight: 600; }
.teaching-panel-title { fill: var(--ink); font-family: var(--serif); font-size: calc(20px * var(--u, 1)); font-weight: 600; }
.teaching-panel-note, .teaching-reference-dose-label { fill: var(--muted); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); }
.teaching-y-label { fill: var(--ink); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); }
.teaching-panel-bg { stroke: var(--line); stroke-width: 1; }
.teaching-reference { fill: none; stroke: #F85C02; stroke-width: 3; stroke-dasharray: 6 4; vector-effect: non-scaling-stroke; }
.teaching-candidate { fill: none; stroke: #6C1446; stroke-width: 3; vector-effect: non-scaling-stroke; }
.teaching-reference-dose { stroke: var(--focus); stroke-width: 1.6; stroke-dasharray: 4 3; vector-effect: non-scaling-stroke; }
.teaching-legend { fill: var(--muted); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); }
.teaching-chart-mobile { display: none; }
.immunity-reference { fill: #F85C02; }
.immunity-candidate { fill: #6C1446; }
.immunity-chart-mobile { display: none; }
.surface-cell, .design-cell { stroke: none; }
.surface-cell.is-inspected { stroke: #6C1446; stroke-width: 2; vector-effect: non-scaling-stroke; }
.threshold-line { fill: none; stroke: #111; stroke-width: 2.2; stroke-dasharray: 7 5; vector-effect: non-scaling-stroke; }
.pareto-casing { fill: none; stroke: var(--paper); stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
.pareto-line { fill: none; stroke: #295958; stroke-width: 4.4; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; paint-order: stroke; }
.side-label { fill: var(--ink); font-size: calc(16px * var(--u, 1)); font-weight: 800; letter-spacing: .7px; paint-order: stroke; stroke: rgba(247,247,242,.85); stroke-width: 3px; }
.anchor-point { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.decision-anchor { fill: var(--ink); }
.hybrid-anchor { stroke: #9B320D; stroke-dasharray: 3 2; }
.decision-anchor-ring { fill: none; stroke: var(--focus); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.decision-scope-boundary { fill: none; stroke: #6C1446; stroke-width: 3; stroke-dasharray: 8 4; vector-effect: non-scaling-stroke; }
.hybrid-interval { stroke: #9B320D; stroke-width: 4; stroke-linecap: round; }
.chart-readout rect { fill: rgb(255 255 255 / .91); stroke: var(--ink); stroke-width: .8; }
.chart-readout text { fill: var(--ink); font-size: calc(16px * var(--u, 1)); }
.chart-readout text:first-of-type { fill: var(--focus); font-weight: 800; letter-spacing: 1px; }
.interpolation-note { fill: var(--muted); font-size: calc(16px * var(--u, 1)); font-style: italic; }
.effect-point { vector-effect: non-scaling-stroke; }
.effect-point.passes { fill: var(--ink); stroke: none; opacity: .9; }
.effect-point.fails { fill: none; stroke: var(--ink); stroke-width: .7; stroke-opacity: .4; }
.comparator-marker { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.comparator-label, .selection-label { fill: var(--ink); font-size: calc(16px * var(--u, 1)); paint-order: stroke; stroke: var(--paper); stroke-width: 3px; }
.selected-exact { fill: none; stroke: var(--focus); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.nearest-grid { fill: none; stroke: #9B320D; stroke-width: 2; vector-effect: non-scaling-stroke; }
.design-cell.is-inspected, .effect-point.is-inspected { stroke: #6C1446; stroke-width: 3; opacity: 1; }
.design-cell.is-persistent, .effect-point.is-persistent { stroke: var(--focus); stroke-width: 3; opacity: 1; }
.empty-frontier { fill: var(--error); font-family: var(--serif); font-size: calc(20px * var(--u, 1)); paint-order: stroke; stroke: var(--paper); stroke-width: 4px; }

.motif-intro { max-width: 820px; margin: 4px 0 16px; color: var(--muted); font-size: var(--fs-body); }
.motif-figure { margin: 14px 0 40px; }
.motif-svg { display: block; width: min(100%, 900px); height: auto; margin-inline: auto; overflow: visible; }
.motif-frame { fill: none; stroke: var(--line-dark); stroke-dasharray: 4 4; }
.motif-frame-label { fill: var(--faint); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); font-weight: 800; letter-spacing: .1em; }
.motif-node { fill: var(--paper-deep); stroke: var(--ink); stroke-width: 2; }
.motif-node-index { fill: rgb(108 20 70 / 10%); }
.motif-name { fill: var(--ink); font-family: var(--serif); font-size: calc(18px * var(--u, 1)); }
.motif-link { fill: var(--muted); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); }
.motif-arrow { stroke: var(--ink); stroke-width: 2; }
.motif-arrowhead { fill: var(--ink); }
.motif-foot { fill: var(--faint); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); font-style: italic; }
.motif-house-body { fill: var(--paper-deep); stroke: var(--ink); stroke-width: 2; }
.motif-house-roof { fill: rgb(108 20 70 / 10%); stroke: var(--ink); stroke-width: 2; stroke-linejoin: round; }
.motif-house-label { fill: var(--muted); font-family: var(--sans); font-size: calc(16px * var(--u, 1)); font-weight: 700; }
.motif-readout { max-width: 760px; margin: 0 0 40px; padding: 18px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.motif-readout label { flex-direction: row; align-items: center; flex-wrap: wrap; gap: 14px; margin: 0 0 10px; font-size: var(--fs-body); }
.motif-readout input[type="range"] { max-width: 320px; }
.motif-readout output { color: var(--russet-dark); font-family: var(--serif); font-size: var(--fs-accent); }
.motif-readout p { margin: 0; color: var(--muted); font-size: var(--fs-body); }

@media (max-width: 980px) {
  .opening { grid-template-columns: 1fr; }
  .decision-controls { max-width: 720px; padding: 28px 0 0; border-left: 0; border-top: 1px solid var(--line-dark); }
  .linked-maps { gap: 20px; }
  .mechanism-values { grid-template-columns: repeat(2, 1fr); }
  .mechanism-values article:nth-child(2) { border-right: 0; }
  .mechanism-values article:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(3, minmax(90px, 1fr)); }
  .advanced-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .product-parameter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .fixed-values { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .control-row { grid-template-columns: 1fr 1fr; }
  .control-row > :first-child { grid-column: 1 / -1; }
  .setting-controls .control-row { grid-template-columns: 1fr 1fr; }
  .setting-controls .control-row > :first-child { grid-column: auto; }
  .pathway { grid-template-columns: 1fr 1fr; gap: 22px; }
  .pathway i { display: none; }
}

@media (max-width: 720px) {
  .site-header { gap: 12px; }
  .site-header nav { min-width: 0; overflow-x: auto; gap: 16px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .site-header nav::-webkit-scrollbar { display: none; }
  .site-header nav a { white-space: nowrap; }
  .hero { min-height: auto; padding-top: 80px; }
  .prototype-banner { align-items: flex-start; flex-direction: column; gap: 4px; }
  .opening-meta { grid-template-columns: 1fr; gap: 14px; }
  .opening-comparison { grid-template-columns: 1fr; gap: 14px; }
  .opening-comparison i { display: none; }
  .chapter { padding-block: 72px; }
  .teaching-chart { display: none; }
  .teaching-chart-mobile { display: block; }
  .immunity-chart { display: none; }
  .immunity-chart-mobile { display: block; }
  .pathway { grid-template-columns: 1fr; }
  .pathway article { min-height: 0; }
  .narrative-controls { margin-top: 34px; }
  .linked-maps { grid-template-columns: 1fr; }
  .frontier-summary { flex-direction: column; gap: 4px; }
  .meaning-note { grid-template-columns: 1fr; gap: 8px; }
  .transmission-handshake dl { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .assumptions-list { columns: 1; }
  summary { flex-direction: column; gap: 6px; }
  .site-footer { flex-direction: column; gap: 8px; }
}

@media (max-width: 480px) {
  .app-shell, .site-footer { width: calc(100% - 28px); }
  .opening > *, .chapter-heading > *, .controls-title > *, .control-row > *, .opening-meta > *, .linked-maps > *, .design-inspection > *, .mechanism-values > * { min-width: 0; }
  h1 { font-size: clamp(2.2rem, 11vw, 3.4rem); }
  h2 { font-size: 1.9rem; }
  .opening { padding-top: 30px; }
  .control-pair, .advanced-grid, .product-parameter-grid { grid-template-columns: 1fr; }
  .control-row, .setting-controls .control-row { grid-template-columns: 1fr; }
  .control-row > :first-child, .setting-controls .control-row > :first-child { grid-column: auto; }
  .result-number { grid-template-columns: 1fr; gap: 6px; }
  .result-number strong, .result-number span:first-child, .result-number span:last-child { grid-column: 1; grid-row: auto; }
  .result-number span:first-child { order: -1; }
  .mechanism-values { grid-template-columns: 1fr; }
  .mechanism-values article { border-right: 0; border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .design-inspection { align-items: stretch; flex-direction: column; }
  .fixed-values { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .parameter-context { grid-template-columns: 1fr; gap: 2px; }
  .transmission-handshake dl { grid-template-columns: 1fr; }
  .chart-slot { max-width: 100%; overflow-x: clip; }
  .scientific-chart { max-width: 100%; overflow: hidden; }
  .site-footer p, .prototype-banner span, #export-status { overflow-wrap: anywhere; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

@media (forced-colors: active) {
  .surface-cell, .design-cell { forced-color-adjust: none; }
  .threshold-line, .pareto-line, .anchor-point, .selected-exact, .effect-point { stroke: CanvasText; }
  .effect-point.passes, .decision-anchor { fill: CanvasText; }
  .effect-point.fails { fill: Canvas; }
}

@media print {
  .site-header, .decision-controls, .narrative-controls, .control-actions, .controls-and-provenance, .export-actions, .transaction-status { display: none !important; }
  .print-product-summary { display: block; margin: 18px 0 24px; padding: 16px 0; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--line); font-size: var(--fs-body); }
  .print-product-summary dl { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 24px; margin: 0 0 14px; }
  .print-product-summary dl div { min-width: 0; }
  .print-product-summary dd { font-size: var(--fs-body); }
  .print-product-summary p:last-child { max-width: 820px; margin-bottom: 0; color: var(--muted); }
  body { background: white; }
  .app-shell, .site-footer { width: 100%; }
  .hero { min-height: 0; padding-top: 20px; }
  .chapter { break-inside: avoid; padding-block: 35px; }
  #story-results.is-stale { opacity: 1; filter: none; }
}

  <header class="site-header"><a class="wordmark" href="#top" aria-label="Polio vaccine target product profile explorer home">TPP / WPV1</a><nav aria-label="Narrative chapters"><a href="#within-host">Model</a><a href="#product-pathway">Product</a><a href="#transmission">Transmission</a><a href="#decision">Decision</a><a href="#measurement">Measurement</a></nav></header>
  <main id="top" class="app-shell">
    <header class="hero">
      <p class="eyebrow">WPV1 \xB7 close-contact sufficiency model \xB7 contract ${w.designContractVersion}</p>
      <h1>Under what conditions can a vaccine block close-contact transmission?</h1>
      <p class="lede">Begin with a child exposed to WPV in the UP/Bihar reference setting. Follow the model from schedule-derived immunity, through acquisition and shedding, into a close-contact transmission motif\u2014then ask what product properties clear that stress test.</p>
      <p class="orienting"><strong>What this is, and what to look for.</strong> This tool explores one question: how much shedding reduction must a vaccine produce to interrupt poliovirus transmission anywhere, under a given schedule? It is based on a published polio model (PLoS Biology, 2018): a serology-based mucosal-immunity correlate for OPV recipients sets the probability of infection at a given wild-poliovirus exposure, then the shedding that follows, then transmission through close contacts. Modeling global eradication in one go is hard, so we assume a vaccine that pushes the effective reproduction number among close contacts (R<sub>loc</sub>) below one will likely win anywhere: reduce transmission among the closest contacts and every weaker contact falls further. The number to look for is the 100- to 1,000-fold shedding-index reduction it takes to interrupt transmission everywhere. That is what we study.</p>
      <p class="orienting"><strong>How to use it.</strong> The page is an interactive narrative through the model of a next-gen gut mucosal vaccine. Read it through once as laid out. Then turn the knobs: every figure is wired to the same model engine, so as you change parameters and interact with the graphs, the whole page recomputes\u2014scroll up and down to watch how the story changes with your inputs.</p>
      <p id="opening-comparison" class="opening-comparison" aria-live="off"></p>
      <aside class="prototype-banner" role="note"><strong>Scientific prototype \xB7 point rule</strong><span>This is a deterministic close-contact sufficiency screen under the v1 axiom\u2014not a complete-population R<sub>e</sub>, outbreak forecast, or probability of product success.</span></aside>
    </header>

    <section id="within-host" class="chapter teaching-chapter" aria-labelledby="within-host-heading">
      <div class="chapter-heading"><p class="chapter-number">01 / WPV exposure</p><div><h2 id="within-host-heading">First, separate acquisition from what happens after breakthrough.</h2><p>UP/Bihar is the fixed teaching reference for the transmission setting. The curves below compare a naive reference cohort with the selected vaccine schedule at the same assessment age of <span id="assessment-age">about 4 months</span>.</p></div></div>
      <figure class="hero-figure wide-breakout"><div id="within-host-chart" class="chart-slot" aria-live="off"></div><figcaption><strong>Read each conditioning statement literally.</strong> Acquisition depends on WPV challenge dose. The next two panels condition on acquisition \u2014 duration of shedding, then concentration among shedders \u2014 and the fourth integrates them at the reference challenge into the shedding index. This preserves the joint expectation rather than averaging an "average child."</figcaption></figure>
      <div id="within-host-readout" class="mechanism-values teaching-readout"></div>
    </section>

    <section id="product-pathway" class="chapter" aria-labelledby="product-pathway-heading">
      <div class="chapter-heading"><p class="chapter-number">02 / Schedule to cohort</p><div><h2 id="product-pathway-heading">A received live-vaccine dose may take, boost mucosal immunity, and then wane.</h2><p>Every routine dose is received in v1. Biological take is productive live-vaccine infection after receipt; it is not receipt, coverage, or direct protection against a WPV dose. Repeated take/no-take branches produce the cohort distribution shown here.</p></div></div>
      <div class="pathway" role="img" aria-label="Received dose, biological take or no take, mucosal boost, waning, and the cohort immunity distribution before WPV exposure"><article><span>Received dose</span><strong>Schedule event</strong><p>Routine doses at 6, 10, and 14 weeks, plus an optional booster.</p></article><i aria-hidden="true">\u2192</i><article><span>Biological split</span><strong>Take / no take</strong><p>Each branch is probability weighted; no dose receipt is missing.</p></article><i aria-hidden="true">\u2192</i><article><span>State transition</span><strong>Boost then wane</strong><p>Take changes mucosal state; time to assessment allows waning.</p></article><i aria-hidden="true">\u2192</i><article><span>WPV challenge</span><strong>Distribution enters model</strong><p>Transmission uses the full state distribution and histories.</p></article></div>
      <p id="product-pathway-summary" class="narrative-summary"></p>
      <aside id="print-product-summary" class="print-product-summary" aria-label="Selected product mechanism for print"></aside>

    <section id="transmission" class="chapter" aria-labelledby="mechanism-heading">
      <div class="chapter-heading"><p class="chapter-number">03 / Close-contact transmission</p><div><h2 id="mechanism-heading">Then put breakthrough shedding into one declared transmission motif.</h2><p>The model propagates a breakthrough index child to a household child, then to close social contacts. Its endpoint is the expected tertiary infections, R<sub>loc</sub>, for that motif\u2014not a calculated complete-population R<sub>e</sub>.</p></div></div>
      <p class="eyebrow">THE CLOSE-CONTACT MOTIF</p>
      <p class="motif-intro">A breakthrough index child exposes a household child, who exposes N<sub>s</sub> close social contacts in other households. R<sub>loc</sub> counts expected infections along this motif only.</p>
      <figure class="motif-figure wide-breakout">
        <svg viewBox="0 0 820 290" class="scientific-chart motif-svg" role="img" aria-label="A breakthrough index child transmits within one household to a household child, who then exposes N_s close social contacts in other households. The motif endpoint is R_loc, the expected infections along this motif, not a complete-population reproduction number.">

          <rect class="motif-frame" x="36" y="40" width="410" height="180" rx="8"/><text class="motif-frame-label" x="50" y="60">ONE HOUSEHOLD</text>

          <line class="motif-arrow" x1="440" y1="130" x2="530" y2="110" marker-end="url(#motif-arrow)"/><line class="motif-arrow" x1="440" y1="130" x2="530" y2="148" marker-end="url(#motif-arrow)"/><line class="motif-arrow" x1="440" y1="130" x2="530" y2="196" marker-end="url(#motif-arrow)"/><text class="motif-link" x="486" y="116" text-anchor="middle">${tt("T","hs")} \xB7 ${tt("d","hs")}</text>

      <div class="transmission-handshake"><p class="eyebrow">What happens on each link</p><p><strong>Infectious survival and stool concentration</strong> from the index child, multiplied by <strong>grams of stool per exposure</strong>, determine a recipient's daily oral WPV dose. The recipient's full immunity distribution determines acquisition at that dose. Repeated daily exposures compose as cumulative escape, not as one exposure to an average child. Setting exposure is a <span class="prov-tag" data-kind="scenario-input">scenario input</span> and the contact structure is inherited; R<sub>loc</sub> is <span class="prov-tag" data-kind="derived">derived</span>.</p><dl><div><dt>UP/Bihar index \u2192 household</dt><dd>${Co(e.Tih.value)} \xB5g stool-equivalent/exposure \xD7 ${Ao(e.dIh.value)}</dd></div><div><dt>Household \u2192 social contact</dt><dd>${Co(e.Ths.value)} \xB5g stool-equivalent/exposure \xD7 ${Ao(e.dHs.value)}</dd></div><div><dt>Social-contact motif</dt><dd>N<sub>s</sub> = ${e.Ns} family-like child contacts</dd></div><div><dt>Index conditioning</dt><dd>Actual breakthrough after one WPV HID50, not a random vaccinated child</dd></div></dl><p class="transmission-equation">R<sub>loc</sub> = N<sub>s</sub> \xD7 P(one close social contact is infected).</p></div>
      <div class="motif-readout"><p class="eyebrow">See R<sub>loc</sub> build from contacts</p><label>Close social contacts, N<sub>s</sub><input id="motif-contacts" type="range" min="0" max="20" step="1"><output id="motif-rloc" aria-live="polite"></output></label><p>At the committed setting, R<sub>loc</sub> grows in proportion to the number of close social contacts. This is a view-only readout. It never changes the committed decision, scenario, or exports.</p></div>
      <div id="mechanism-values" class="mechanism-values"></div>
      <aside class="meaning-note"><strong>The decision step</strong><p>If R<sub>loc</sub> stays below one at the chosen setting, the candidate passes a deliberately hard local test: block transmission among the closest contacts and easier settings should follow. The shedding index is a useful summary of the within-host effects, but it can't stand in for the full motif calculation that makes the call.</p></aside>
    </section>

    <section id="decision" class="chapter surface-chapter" aria-labelledby="decision-heading">
      <div class="chapter-heading"><p class="chapter-number">04 / Setting and decision</p><div><h2 id="decision-heading">Only now ask whether the selected product clears the reference stress test.</h2><p>The default point rule is evaluated directly at the UP/Bihar high anchor, the hardest known empirical/model-calibrated setting in the catalog. Clearing it supports likely adequacy under less demanding modeled conditions; it does not prove control everywhere. Parameter uncertainty and a threshold-crossing probability are <span class="prov-tag" data-kind="not-measured">not measured</span> in v1.</p></div></div>
      <form class="narrative-controls setting-controls" aria-labelledby="setting-controls-heading" onsubmit="return false"><div class="controls-title"><div><p class="eyebrow">Setting</p><h3 id="setting-controls-heading">Choose the field setting you are deciding for.</h3></div></div><div class="control-row"><label>Decision scope<select id="scope">${r}</select><small>Sets the field exposure and contacts the candidate must clear, and marks that anchor on the surface. UP/Bihar high is the hardest known.</small></label></div></form>
      <figure class="hero-figure wide-breakout"><div id="setting-map" class="chart-slot" aria-live="off"></div><figcaption><strong>Read from blue through white to red.</strong> White is R<sub>loc</sub> = 1. The ringed diamond is the selected decision anchor. The outlined cell is the display cell you are inspecting, and its readout is that raster cell \u2014 not the decision calculation. The dashed path marks threshold crossings between directly evaluated display cells. Hover or use arrow keys to move the inspected cell across all 61 \xD7 20 cells.</figcaption></figure>

    <section id="design-space" class="chapter" aria-labelledby="design-heading">
      <div class="chapter-heading"><p class="chapter-number">06 / From requirement to product</p><div><h2 id="design-heading">The same evaluated products can be read in outcome space or product space.</h2><p>Outcome space shows the acquisition-blocking and breakthrough-shedding reductions achieved by each evaluated product. Product space shows the biological take context and latent mucosal response assumptions that generated them. Neither outcome axis is an independently tunable specification.</p></div></div>
      <div id="frontier-summary" class="frontier-summary"></div>
