<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; font-src 'none';">
<title>Next-generation polio vaccine TPP generator</title>
<style>:root {
  color-scheme: light;
  --paper: #f7f7f2;
  --paper-deep: #eeeee7;
  --ink: #1d2528;
  --muted: #626b6d;
  --faint: #a9aeaa;
  --line: #cfd0c7;
  --line-dark: #8f948f;
  --russet: #9a4f37;
  --russet-dark: #743a2a;
  --russet-soft: #ead8cf;
  --blue: #2166ac;
  --white-map: #f7f7f2;
  --red: #b2182b;
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-family: var(--sans);
  font-synthesis: none;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--paper); color: var(--ink); line-height: 1.55; }
button, input, select { font: inherit; }
a { color: inherit; text-underline-offset: .2em; }
[hidden] { display: none !important; }

.skip-link { position: fixed; z-index: 30; top: 8px; left: 8px; transform: translateY(-160%); background: var(--ink); color: var(--paper); padding: 8px 12px; }
.skip-link:focus { transform: none; }
.site-header { position: sticky; z-index: 20; top: 0; display: flex; align-items: center; justify-content: space-between; min-height: 54px; padding: 0 clamp(16px, 4vw, 58px); border-bottom: 1px solid rgba(29, 37, 40, .2); background: rgba(247, 247, 242, .94); backdrop-filter: blur(10px); }
.wordmark { font-weight: 800; letter-spacing: .12em; text-decoration: none; font-size: .78rem; }
.site-header nav { display: flex; gap: clamp(12px, 2vw, 28px); font-size: .78rem; }
.site-header nav a { color: var(--muted); text-decoration: none; }
.site-header nav a:hover { color: var(--ink); }

.app-shell, .site-footer { width: min(1240px, calc(100% - clamp(28px, 7vw, 96px))); margin-inline: auto; }
.hero { min-height: 42vh; display: flex; flex-direction: column; justify-content: flex-end; max-width: 1020px; padding: clamp(70px, 12vw, 150px) 0 58px; }
.eyebrow, .chapter-number, .result-label, .inspector-label { margin: 0 0 10px; color: var(--russet-dark); font-size: .7rem; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
h1, h2, h3, p { margin-top: 0; }
h1, h2, h3 { font-family: var(--serif); font-weight: 400; }
h1 { max-width: 980px; margin-bottom: 24px; font-size: clamp(2.65rem, 7vw, 6.6rem); line-height: .96; letter-spacing: -.045em; }
h2 { margin-bottom: 14px; font-size: clamp(1.8rem, 3.5vw, 3.5rem); line-height: 1.05; letter-spacing: -.025em; }
h3 { font-size: 1.45rem; }
.lede { max-width: 760px; margin-bottom: 28px; color: #424b4d; font-family: var(--serif); font-size: clamp(1.1rem, 1.8vw, 1.38rem); }
.prototype-banner { display: flex; gap: 14px; align-items: baseline; max-width: 840px; padding-top: 13px; border-top: 2px solid var(--russet); color: var(--muted); font-size: .85rem; }
.prototype-banner strong { flex: 0 0 auto; color: var(--ink); }

.opening { display: grid; grid-template-columns: minmax(0, 1.45fr) minmax(290px, .55fr); gap: clamp(32px, 6vw, 90px); align-items: start; padding: 44px 0 52px; border-top: 1px solid var(--ink); }
#story-results { min-width: 0; transition: opacity .15s ease, filter .15s ease; }
#story-results.is-stale { opacity: .52; filter: grayscale(.65); }
.result-status { padding: 0 0 30px; border-bottom: 1px solid var(--line); }
.result-status h2 { max-width: 760px; }
.result-status.fail h2, .result-status.tie h2 { color: var(--russet-dark); }
.result-number { display: grid; grid-template-columns: auto 1fr; gap: 0 18px; align-items: end; width: fit-content; margin: 26px 0 24px; font-size: .78rem; color: var(--muted); }
.result-number strong { grid-row: span 2; grid-column: 1; color: var(--ink); font-family: var(--serif); font-size: clamp(3.8rem, 8vw, 7rem); font-weight: 400; line-height: .8; font-variant-numeric: tabular-nums; }
.result-number span:first-child { grid-column: 2; align-self: end; color: var(--ink); font-weight: 750; }
.result-number span:last-child { grid-column: 2; max-width: 340px; }
.qualification { max-width: 760px; margin: 0; padding-left: 18px; border-left: 3px solid var(--russet); color: #454d4f; }
.opening-meta { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; padding-top: 20px; }
.opening-meta p { margin: 0; }
.opening-meta span { display: block; margin-bottom: 4px; color: var(--muted); font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.opening-meta strong { display: block; font-size: .86rem; line-height: 1.4; }

.decision-controls { padding-left: 26px; border-left: 1px solid var(--line-dark); }
.controls-title { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
.controls-title h2 { font-family: var(--serif); font-size: 1.75rem; }
label { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; font-size: .76rem; font-weight: 750; letter-spacing: .02em; }
label small { color: var(--muted); font-size: .72rem; font-weight: 400; line-height: 1.4; letter-spacing: 0; }
select, input[type="number"] { width: 100%; min-height: 42px; padding: 8px 9px; border: 0; border-bottom: 1px solid var(--line-dark); border-radius: 0; background: transparent; color: var(--ink); }
select:hover, input[type="number"]:hover { border-color: var(--ink); }
input[type="range"] { width: 100%; accent-color: var(--russet); }
output { align-self: flex-end; color: var(--russet-dark); font-variant-numeric: tabular-nums; }
.control-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.control-actions { display: flex; gap: 12px; align-items: center; margin-top: 18px; }
.control-actions span { color: var(--muted); font-size: .72rem; }
button { min-height: 40px; padding: 9px 15px; border: 1px solid var(--ink); border-radius: 0; background: transparent; color: var(--ink); cursor: pointer; font-size: .78rem; font-weight: 760; }
button:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
button.primary { background: var(--ink); color: var(--paper); }
button.primary:hover:not(:disabled) { background: var(--russet-dark); border-color: var(--russet-dark); }
button.text-button { min-height: auto; padding: 3px 0; border: 0; border-bottom: 1px solid currentColor; color: var(--muted); }
button:disabled { cursor: not-allowed; opacity: .38; }
button:focus-visible, a:focus-visible, summary:focus-visible, select:focus-visible, input:focus-visible, svg:focus-visible { outline: 3px solid var(--blue); outline-offset: 3px; }
.warning { margin: 14px 0 0; padding: 10px 0 10px 14px; border-left: 3px solid var(--russet); color: var(--russet-dark); font-size: .78rem; }
.warning.notice { border-color: var(--line-dark); color: var(--muted); }
.transaction-status { min-height: 44px; margin: 0; padding: 12px 0; border-top: 1px solid var(--line); color: var(--muted); font-size: .76rem; }
.transaction-status.stale, .transaction-status.invalid { color: var(--russet-dark); }

.chapter { padding: clamp(66px, 10vw, 130px) 0; border-top: 1px solid var(--ink); }
.chapter-heading { display: grid; grid-template-columns: minmax(120px, .27fr) minmax(0, .73fr); gap: clamp(24px, 5vw, 80px); margin-bottom: 50px; }
.chapter-heading > div { max-width: 850px; }
.chapter-heading > div > p { max-width: 730px; color: var(--muted); font-size: 1rem; }
.surface-chapter { padding-top: 75px; }
.hero-figure, .linked-maps figure { margin: 0; }
.hero-figure { width: min(100%, 1060px); margin-inline: auto; }
.chart-slot { width: 100%; min-height: 120px; }
.scientific-chart { display: block; width: 100%; height: auto; overflow: visible; }
figcaption { max-width: 880px; margin: 13px 0 0; color: var(--muted); font-size: .78rem; }
figcaption strong { color: var(--ink); }

.motif { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: clamp(14px, 3vw, 42px); align-items: center; margin: 20px 0 54px; }
.motif article { min-height: 170px; padding-top: 15px; border-top: 2px solid var(--ink); }
.motif article span { color: var(--russet); font-size: .72rem; font-weight: 800; }
.motif article strong { display: block; margin: 11px 0 8px; font-family: var(--serif); font-size: 1.35rem; font-weight: 400; }
.motif article p { color: var(--muted); font-size: .82rem; }
.motif i { font-family: var(--serif); font-size: 2rem; font-style: normal; }
.mechanism-values { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0; border-top: 1px solid var(--line-dark); border-bottom: 1px solid var(--line-dark); }
.mechanism-values article { padding: 22px 20px 24px; border-right: 1px solid var(--line); }
.mechanism-values article:last-child { border-right: 0; }
.mechanism-values span { color: var(--muted); font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.mechanism-values strong { display: block; margin: 12px 0 8px; font-family: var(--serif); font-size: 1.45rem; font-weight: 400; }
.mechanism-values p { margin: 0; color: var(--muted); font-size: .76rem; }
.mechanism-values .diagnostic { background: rgba(29, 37, 40, .025); }
.mechanism-values .authoritative { border-top: 4px solid var(--russet); padding-top: 18px; }
.meaning-note { display: grid; grid-template-columns: .28fr .72fr; gap: 30px; margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); color: var(--muted); font-size: .82rem; }
.meaning-note strong { color: var(--ink); }
.meaning-note p { margin: 0; max-width: 720px; }

.frontier-summary { display: flex; justify-content: space-between; gap: 30px; margin-bottom: 24px; padding: 13px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: .8rem; }
.frontier-summary span { color: var(--muted); }
.linked-maps { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: clamp(24px, 4vw, 60px); }
.design-inspection { display: flex; justify-content: space-between; gap: 24px; align-items: end; min-height: 135px; margin-top: 36px; padding: 22px 0 0; border-top: 1px solid var(--ink); }
#design-inspector { flex: 1; }
#design-inspector > p { margin-bottom: 0; color: var(--muted); }
#design-inspector dl { display: grid; grid-template-columns: repeat(6, minmax(90px, 1fr)); gap: 15px; margin: 0; }
#design-inspector dl div { min-width: 0; }
dt { color: var(--muted); font-size: .67rem; font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
dd { margin: 3px 0 0; font-family: var(--serif); font-size: 1rem; font-variant-numeric: tabular-nums; }

.table-wrap { overflow-x: auto; border-top: 1px solid var(--ink); }
table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: .8rem; }
th, td { padding: 16px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
thead th { color: var(--muted); font-size: .66rem; letter-spacing: .1em; text-transform: uppercase; }
tbody th { width: 21%; font-family: var(--serif); font-size: .92rem; font-weight: 400; }
tbody td:nth-child(2), tbody td:nth-child(4) { width: 18%; color: var(--russet-dark); }

.controls-and-provenance { padding-top: 0; border-top: 0; }
details { border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
summary { display: flex; justify-content: space-between; gap: 30px; padding: 20px 0; cursor: pointer; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary span { font-family: var(--serif); font-size: 1.45rem; }
summary span::before { content: "+"; display: inline-block; width: 28px; color: var(--russet); }
details[open] summary span::before { content: "−"; }
summary small { max-width: 520px; color: var(--muted); font-size: .75rem; }
.advanced-body { padding: 20px 0 45px; }
fieldset { margin: 0 0 40px; padding: 22px 0 0; border: 0; border-top: 1px solid var(--line); }
legend { padding-right: 20px; font-family: var(--serif); font-size: 1.2rem; }
fieldset > p { color: var(--muted); font-size: .78rem; }
.advanced-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px 26px; }
.catalog-note { padding: 18px 0; color: var(--muted); }
.fixed-values { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 18px; margin: 0; }

.closing { padding-bottom: 70px; }
.assumptions-list { columns: 2; column-gap: 55px; padding-left: 20px; }
.assumptions-list li { break-inside: avoid; margin-bottom: 12px; padding-left: 5px; color: #454d4f; font-size: .82rem; }
.uncertainty-note { margin: 26px 0 0; padding: 16px 0 16px 18px; border-left: 3px solid var(--russet); color: var(--muted); font-size: .82rem; }
.exports { margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--ink); }
.exports h3 { margin-bottom: 5px; }
.exports > p { max-width: 740px; color: var(--muted); font-size: .8rem; }
.export-actions { display: flex; flex-wrap: wrap; gap: 8px; }
#export-status { min-height: 24px; margin-top: 14px; color: var(--muted); font-size: .75rem; overflow-wrap: anywhere; }
.site-footer { display: flex; justify-content: space-between; gap: 30px; padding: 26px 0 40px; border-top: 1px solid var(--ink); color: var(--muted); font-size: .7rem; }
.site-footer p { margin: 0; }

/* Scientific charts: analytical color is reserved for the blue-white-red scale. */
.plot-bg { fill: var(--paper); }
.grid-line { stroke: var(--ink); stroke-width: .7; stroke-opacity: .13; }
.tick-mark { stroke: var(--ink); stroke-width: 1; }
.tick, .anchor-label, .hybrid-label, .surface-legend, .chart-key { fill: var(--muted); font-family: var(--sans); font-size: 9px; }
.axis-label { fill: var(--ink); font-family: var(--sans); font-size: 11px; font-weight: 650; }
.chart-kicker { fill: var(--russet-dark); font-family: var(--sans); font-size: 9px; font-weight: 800; letter-spacing: 1.4px; }
.chart-title { fill: var(--ink); font-family: var(--serif); font-size: 19px; }
.surface-cell, .design-cell { stroke: none; }
.surface-cell.is-inspected { stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.threshold-line { fill: none; stroke: #111; stroke-width: 2.2; stroke-dasharray: 7 5; vector-effect: non-scaling-stroke; }
.pareto-line { fill: none; stroke: var(--russet); stroke-width: 3; vector-effect: non-scaling-stroke; }
.side-label { fill: var(--ink); font-size: 8px; font-weight: 800; letter-spacing: .7px; paint-order: stroke; stroke: rgba(247,247,242,.85); stroke-width: 3px; }
.anchor-point { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.decision-anchor { fill: var(--ink); }
.hybrid-anchor { stroke: var(--russet); stroke-dasharray: 3 2; }
.probe-ring { fill: none; stroke: var(--ink); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.decision-scope-boundary { fill: none; stroke: var(--russet); stroke-width: 3; stroke-dasharray: 8 4; vector-effect: non-scaling-stroke; }
.hybrid-interval { stroke: var(--russet); stroke-width: 4; stroke-linecap: round; }
.chart-readout rect { fill: rgba(247, 247, 242, .91); stroke: var(--ink); stroke-width: .8; }
.chart-readout text { fill: var(--ink); font-size: 8.5px; }
.chart-readout text:first-of-type { fill: var(--russet-dark); font-weight: 800; letter-spacing: 1px; }
.interpolation-note { fill: var(--muted); font-size: 8px; font-style: italic; }
.effect-point { vector-effect: non-scaling-stroke; }
.effect-point.passes { fill: var(--ink); stroke: none; opacity: .63; }
.effect-point.fails { fill: var(--paper); stroke: var(--ink); stroke-width: .75; opacity: .48; }
.comparator-marker { fill: var(--paper); stroke: var(--ink); stroke-width: 2; vector-effect: non-scaling-stroke; }
.comparator-label, .selection-label { fill: var(--ink); font-size: 8px; paint-order: stroke; stroke: var(--paper); stroke-width: 3px; }
.selected-exact { fill: none; stroke: var(--ink); stroke-width: 2.5; vector-effect: non-scaling-stroke; }
.nearest-grid { fill: none; stroke: var(--russet); stroke-width: 2; vector-effect: non-scaling-stroke; }
.design-cell.is-inspected, .effect-point.is-inspected { stroke: var(--russet); stroke-width: 3; opacity: 1; }
.design-cell.is-persistent, .effect-point.is-persistent { stroke: var(--ink); stroke-width: 3; opacity: 1; }
.empty-frontier { fill: var(--russet-dark); font-family: var(--serif); font-size: 16px; paint-order: stroke; stroke: var(--paper); stroke-width: 4px; }

@media (max-width: 980px) {
  .opening { grid-template-columns: 1fr; }
  .decision-controls { max-width: 720px; padding: 28px 0 0; border-left: 0; border-top: 1px solid var(--line-dark); }
  .chapter-heading { grid-template-columns: 1fr; gap: 10px; }
  .chapter-number { margin-bottom: 0; }
  .linked-maps { gap: 20px; }
  .mechanism-values { grid-template-columns: repeat(2, 1fr); }
  .mechanism-values article:nth-child(2) { border-right: 0; }
  .mechanism-values article:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(3, minmax(90px, 1fr)); }
  .advanced-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .fixed-values { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 720px) {
  .site-header nav { display: none; }
  .hero { min-height: auto; padding-top: 80px; }
  .prototype-banner { align-items: flex-start; flex-direction: column; gap: 4px; }
  .opening-meta { grid-template-columns: 1fr; gap: 14px; }
  .chapter { padding-block: 72px; }
  .motif { grid-template-columns: 1fr; }
  .motif i { transform: rotate(90deg); text-align: center; line-height: .6; }
  .motif article { min-height: 0; }
  .linked-maps { grid-template-columns: 1fr; }
  .frontier-summary { flex-direction: column; gap: 4px; }
  .meaning-note { grid-template-columns: 1fr; gap: 8px; }
  .assumptions-list { columns: 1; }
  summary { flex-direction: column; gap: 6px; }
  .site-footer { flex-direction: column; gap: 8px; }
}

@media (max-width: 480px) {
  .app-shell, .site-footer { width: calc(100% - 28px); }
  h1 { font-size: clamp(2.55rem, 15vw, 4.2rem); }
  h2 { font-size: 2rem; }
  .opening { padding-top: 30px; }
  .control-pair, .advanced-grid { grid-template-columns: 1fr; }
  .result-number { grid-template-columns: 1fr; gap: 6px; }
  .result-number strong, .result-number span:first-child, .result-number span:last-child { grid-column: 1; grid-row: auto; }
  .result-number span:first-child { order: -1; }
  .mechanism-values { grid-template-columns: 1fr; }
  .mechanism-values article { border-right: 0; border-bottom: 1px solid var(--line); }
  #design-inspector dl { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .design-inspection { align-items: stretch; flex-direction: column; }
  .fixed-values { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .scientific-chart { overflow: hidden; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

@media (forced-colors: active) {
  .surface-cell, .design-cell { forced-color-adjust: none; }
  .threshold-line, .pareto-line, .anchor-point, .selected-exact, .effect-point { stroke: CanvasText; }
  .effect-point.passes, .decision-anchor { fill: CanvasText; }
  .effect-point.fails { fill: Canvas; }
}

@media print {
  .site-header, .decision-controls, .control-actions, .controls-and-provenance, .export-actions, .transaction-status { display: none !important; }
  body { background: white; }
  .app-shell, .site-footer { width: 100%; }
  .hero { min-height: 0; padding-top: 20px; }
  .chapter { break-inside: avoid; padding-block: 35px; }
  #story-results.is-stale { opacity: 1; filter: none; }
}

  <header class="site-header"><a class="wordmark" href="#top" aria-label="Polio vaccine target product profile explorer home">TPP / WPV1</a><nav aria-label="Narrative chapters"><a href="#setting">Setting</a><a href="#mechanism">Mechanism</a><a href="#design-space">Design space</a><a href="#measurement">Measurement</a></nav></header>
  <main id="top" class="app-shell">
    <header class="hero">
      <p class="eyebrow">WPV1 \xB7 close-contact sufficiency model \xB7 contract ${y.designContractVersion}</p>
      <h1>Under what conditions can a vaccine block close-contact transmission?</h1>
      <p class="lede">Start with a hard empirical anchor, then work backward from the transmission result to the product properties that produce it.</p>
      <aside class="prototype-banner" role="note"><strong>Scientific prototype \xB7 point rule</strong><span>This is a deterministic close-contact sufficiency screen under the v1 axiom\u2014not a complete-population R<sub>e</sub>, outbreak forecast, or probability of product success.</span></aside>
    </header>

    <section class="opening" aria-labelledby="opening-heading">
      <div id="story-results">
        <div id="result-status" class="result-status pending" aria-live="polite"><p class="result-label">Evaluating</p><h2 id="opening-heading">Calculating the versioned default\u2026</h2></div>

      </div>
      <form class="decision-controls" aria-labelledby="controls-heading" onsubmit="return false">
        <div class="controls-title"><div><p class="eyebrow">Decision controls</p><h2 id="controls-heading">Ask another version</h2></div><button id="reset" type="button" class="text-button">Reset</button></div>
        <label>Candidate product<select id="product">${e}</select></label>
        <div class="control-pair"><label>Booster<select id="booster" data-model-control><option value="0">No booster</option><option value="1">At 1 year</option><option value="2">At 2 years</option><option value="3">At 3 years</option><option value="4">At 4 years</option></select></label><label>Assessment<select id="lag" data-model-control><option value="28">28 days after dose</option><option value="90">90 days after dose</option></select></label></div>

        <label>Decision scope<select id="scope">${n}</select><small>Directly determines the reported maximum R<sub>loc</sub>.</small></label>
        <p id="state-warning" class="warning" hidden></p>

    </section>

    <section id="setting" class="chapter surface-chapter" aria-labelledby="setting-heading">
      <div class="chapter-heading"><p class="chapter-number">01 / Setting pressure</p><div><h2 id="setting-heading">A win at the hardest known modeled anchor is a demanding stress test.</h2><p>UP/Bihar combines unusually intense modeled exposure and close social mixing. Clearing it supports\u2014without proving\u2014likely adequacy under less demanding conditions represented by this mechanism.</p></div></div>
      <figure class="hero-figure"><div id="setting-map" class="chart-slot" aria-live="off"></div><figcaption><strong>Read from blue through white to red.</strong> White is R<sub>loc</sub> = 1. The diamond is the decision anchor; the ring is the independent inspection probe. Arrow keys traverse all 81 \xD7 20 display cells.</figcaption></figure>
    </section>

    <section id="mechanism" class="chapter" aria-labelledby="mechanism-heading">
      <div class="chapter-heading"><p class="chapter-number">02 / Transmission motif</p><div><h2 id="mechanism-heading">One index child, one household link, then close social contacts.</h2><p>The model asks whether this high-strength local motif contracts. It does not reconstruct every connection in a population.</p></div></div>
      <div class="motif" role="img" aria-label="Index child transmits to a household child, who connects to close social contacts">
        <article><span>01</span><strong>Index child</strong><p>Breakthrough infection and infectious shedding after the selected schedule.</p></article><i aria-hidden="true">\u2192</i><article><span>02</span><strong>Household child</strong><p>Acquisition is propagated through the full modeled immunity distribution.</p></article><i aria-hidden="true">\u2192</i><article><span>03</span><strong>Close social contacts</strong><p>N<sub>s</sub> family-like child contacts extend the local motif.</p></article>
      </div>
      <div id="mechanism-values" class="mechanism-values"></div>
      <aside class="meaning-note"><strong>Why R<sub>loc</sub> is not R<sub>e</sub></strong><p>R<sub>loc</sub> is the expected tertiary infections generated by this declared motif. The sufficiency axiom treats the motif as a strong local stress test; it does not calculate full network or geographic spread.</p></aside>
    </section>

    <section id="design-space" class="chapter" aria-labelledby="design-heading">
      <div class="chapter-heading"><p class="chapter-number">03 / From requirement to product</p><div><h2 id="design-heading">Two views, one set of directly evaluated designs.</h2><p>Outcome space says what combination of acquisition blocking and shedding reduction is sufficient. Product space shows which biological take contexts and latent mucosal boosts produce those outcomes.</p></div></div>
      <div id="frontier-summary" class="frontier-summary"></div>
      <div class="linked-maps"><figure><div id="effect-map" class="chart-slot"></div><figcaption><strong>Requirement space.</strong> Axes are modeled outcomes, not independently tunable product specifications. The russet path is the minimum-sufficient Pareto boundary when one exists.</figcaption></figure><figure><div id="product-map" class="chart-slot"></div><figcaption><strong>Product space.</strong> Take is productive biological infection after a received live dose. Mean boost is latent OPV-equivalent mucosal immunity, not serum titer.</figcaption></figure></div>
      <div class="design-inspection"><div id="design-inspector"><p><strong>Inspect a design.</strong> Hover, tap, or focus either map. Click or press Enter to hold a selection.</p></div><button id="use-design" type="button" class="primary" hidden disabled>Use this design</button></div>
    </section>

    <section id="measurement" class="chapter" aria-labelledby="measurement-heading">
      <div class="chapter-heading"><p class="chapter-number">04 / Measurement handshake</p><div><h2 id="measurement-heading">What the controls mean\u2014and what they do not measure.</h2><p>The quantities below connect product assumptions, field setting anchors, inherited model structure, and derived results.</p></div></div>
      <div class="table-wrap"><table><thead><tr><th>Quantity</th><th>Scientific role</th><th>Measurement interpretation</th><th>Status in v1</th></tr></thead><tbody>
        <tr><th scope="row">Biological take context</th><td>Product property</td><td>Productive live-vaccine infection after a received dose; not receipt or coverage.</td><td>Scenario input</td></tr>

        <tr><th scope="row">Exposure, T<sub>ih</sub> / T<sub>hs</sub></th><td>Setting pressure</td><td>Stool-equivalent mass transferred per exposure, converted at the UI boundary.</td><td>Named anchor or custom input</td></tr>
        <tr><th scope="row">Contact frequency and N<sub>s</sub></th><td>Motif structure</td><td>Exposures per person-day and family-like close social contacts.</td><td>Calibrated, inherited, or declared</td></tr>
        <tr><th scope="row">q<sub>acq</sub>, q<sub>shed</sub></th><td>Modeled effects</td><td>Residual acquisition and conditional infectious-shedding multipliers.</td><td>Derived from distributions</td></tr>
